server.port=8080
spring.application.name=TestPlatform

# H2 File-based Database (данные сохраняются между перезапусками)
spring.datasource.url=jdbc:h2:file:./data/testplatform;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (для отладки: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Secret (в продакшн замените на длинный случайный ключ)
app.jwt.secret=TestPlatformSuperSecretKey2024_ChangeInProduction_MustBe256BitsLong!
app.jwt.expiration=86400000
