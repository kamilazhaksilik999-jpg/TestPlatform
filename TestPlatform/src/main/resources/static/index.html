<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), payment=()">
    <title>JavaProject — IT Тестирование</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        :root{
          --bg:#f7f2ea;--bg2:#eee8d8;--bg3:#e6dfc9;--sidebar:#ddd5bf;
          --card:#fdf9f3;--card2:#f2ece0;--border:#d8ccb2;--border2:#c9bc9c;
          --text:#332d1f;--text2:#6b5e40;--text3:#9c8c68;
          --accent:#8b6914;--accent2:#a07820;--accent-bg:#f5e9c0;--accent-mid:#e8d490;
          --green:#3d7a52;--green-bg:#d5eadc;--red:#8f3535;--red-bg:#f0d5d5;
          --blue:#2e588a;--blue-bg:#d4e3f2;
          --shadow:0 1px 12px rgba(90,70,20,.09);--shadow2:0 8px 36px rgba(90,70,20,.16);
          --r:14px;--sw:240px;
        }
        [data-theme="dark"]{
          --bg:#0f0e0b;--bg2:#1a1812;--bg3:#221f17;--sidebar:#181510;
          --card:#1e1b13;--card2:#252118;--border:#332d1f;--border2:#4a4230;
          --text:#f0e8d0;--text2:#c4af88;--text3:#7a6e52;
          --accent:#c89a28;--accent2:#d4a832;--accent-bg:rgba(200,154,40,.12);--accent-mid:rgba(200,154,40,.22);
          --green:#4daa6a;--green-bg:rgba(77,170,106,.12);
          --red:#c05050;--red-bg:rgba(192,80,80,.12);
          --blue:#4a88c8;--blue-bg:rgba(74,136,200,.12);
          --shadow:0 1px 12px rgba(0,0,0,.4);--shadow2:0 8px 36px rgba(0,0,0,.55);
        }
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .2s;}
        ::-webkit-scrollbar{width:5px;}
        ::-webkit-scrollbar-track{background:var(--bg2);}
        ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
        @keyframes popIn{0%{opacity:0;transform:scale(.88) translateY(8px)}80%{transform:scale(1.02) translateY(-1px)}100%{opacity:1;transform:scale(1) translateY(0)}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        input,textarea,select{outline:none;font-family:'DM Sans',sans-serif;transition:border-color .17s;}
        button{font-family:'DM Sans',sans-serif;cursor:pointer;}
        .fu{animation:fadeUp .38s ease both;}
        .pi{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;}
        .si{animation:slideIn .3s ease both;}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const{useState,useEffect,useRef,useCallback}=React;
    const API='';
    const TK='jp_token';
    const UK='jp_user';
    const HISTORY_KEY='jp_history';
    const PROCTOR_KEY='jp_proctor_reports';
    const MY_TESTS_KEY='jp_my_tests';
    const PUB_TESTS_KEY='jp_published_tests';
    const PRIV_TESTS_KEY='jp_private_tests';
    const PRIV_RESULTS_KEY='jp_private_results';
    const SEC_LOG_KEY='jp_security_log';
    const USERS_KEY='jp_users_db';
    const RATE_KEY='jp_rate_limit';

    // ══════════════════════════════════════════════════════════════
    // 🔐 SECURITY MODULE
    // ══════════════════════════════════════════════════════════════

    // ── XSS Protection: sanitize all string inputs ─────────────────
    function sanitize(str){
      if(typeof str!=='string') return str;
      return str.replace(/[<>"'`]/g,c=>({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#x27;','`':'&#x60;'}[c]));
    }
    function sanitizeUser(obj){
      if(!obj||typeof obj!=='object') return obj;
      const safe={};
      for(const k of Object.keys(obj)) safe[k]=typeof obj[k]==='string'?sanitize(obj[k]):obj[k];
      return safe;
    }

    // ── SHA-256 Password Hashing (Web Crypto API) ──────────────────
    async function hashPassword(password,salt=null){
      const s=salt||Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');
      const enc=new TextEncoder();
      const data=enc.encode(s+password+'jp_pepper_2024');
      const buf=await crypto.subtle.digest('SHA-256',data);
      const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      return{hash,salt:s};
    }
    async function verifyPassword(password,storedHash,salt){
      const{hash}=await hashPassword(password,salt);
      return hash===storedHash;
    }

    // ── AES-GCM Encryption for localStorage ───────────────────────
    const ENC_KEY_NAME='jp_enc_key';
    async function getOrCreateEncKey(){
      const stored=sessionStorage.getItem(ENC_KEY_NAME);
      if(stored){
        const raw=Uint8Array.from(atob(stored),c=>c.charCodeAt(0));
        return crypto.subtle.importKey('raw',raw,{name:'AES-GCM'},false,['encrypt','decrypt']);
      }
      const key=await crypto.subtle.generateKey({name:'AES-GCM',length:256},true,['encrypt','decrypt']);
      const exported=await crypto.subtle.exportKey('raw',key);
      sessionStorage.setItem(ENC_KEY_NAME,btoa(String.fromCharCode(...new Uint8Array(exported))));
      return key;
    }
    async function encryptData(plaintext){
      try{
        const key=await getOrCreateEncKey();
        const iv=crypto.getRandomValues(new Uint8Array(12));
        const enc=new TextEncoder().encode(JSON.stringify(plaintext));
        const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc);
        const combined=new Uint8Array(iv.length+ct.byteLength);
        combined.set(iv);combined.set(new Uint8Array(ct),iv.length);
        return btoa(String.fromCharCode(...combined));
      }catch{return JSON.stringify(plaintext);}
    }
    async function decryptData(ciphertext){
      try{
        const key=await getOrCreateEncKey();
        const combined=Uint8Array.from(atob(ciphertext),c=>c.charCodeAt(0));
        const iv=combined.slice(0,12);const ct=combined.slice(12);
        const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
        return JSON.parse(new TextDecoder().decode(dec));
      }catch{try{return JSON.parse(ciphertext);}catch{return null;}}
    }

    // ── JWT-like Token Generator ───────────────────────────────────
    function generateToken(userId,email){
      const header=btoa(JSON.stringify({alg:'HS256',typ:'JWT'}));
      const payload=btoa(JSON.stringify({sub:userId,email,iat:Date.now(),exp:Date.now()+86400000}));
      const sig=btoa(userId+email+Date.now()+'jp_secret_2024').slice(0,32);
      return`${header}.${payload}.${sig}`;
    }
    function parseToken(token){
      try{
        const[,payload]=token.split('.');
        const data=JSON.parse(atob(payload));
        if(data.exp<Date.now()) throw new Error('Token expired');
        return data;
      }catch{return null;}
    }
    function isTokenValid(){
      const token=localStorage.getItem(TK);
      if(!token) return false;
      return parseToken(token)!==null;
    }

    // ── Rate Limiting (max 5 attempts / 15 min) ────────────────────
    function getRateLimitData(email){
      try{return JSON.parse(localStorage.getItem(RATE_KEY)||'{}');}catch{return{};}
    }
    function checkRateLimit(email){
      const data=getRateLimitData();
      const rec=data[email];
      if(!rec) return{allowed:true,remaining:5};
      const now=Date.now();
      if(now-rec.windowStart>15*60*1000){
        delete data[email];localStorage.setItem(RATE_KEY,JSON.stringify(data));
        return{allowed:true,remaining:5};
      }
      if(rec.attempts>=5){
        const wait=Math.ceil((15*60*1000-(now-rec.windowStart))/60000);
        return{allowed:false,remaining:0,waitMinutes:wait};
      }
      return{allowed:true,remaining:5-rec.attempts};
    }
    function recordFailedAttempt(email){
      const data=getRateLimitData();
      const now=Date.now();
      if(!data[email]||now-data[email].windowStart>15*60*1000)
        data[email]={attempts:1,windowStart:now};
      else data[email].attempts++;
      localStorage.setItem(RATE_KEY,JSON.stringify(data));
    }
    function clearRateLimit(email){
      const data=getRateLimitData();
      delete data[email];
      localStorage.setItem(RATE_KEY,JSON.stringify(data));
    }

    // ── Security Event Logger ──────────────────────────────────────
    function logSecurityEvent(type,detail,userId=null){
      try{
        const logs=JSON.parse(localStorage.getItem(SEC_LOG_KEY)||'[]');
        logs.unshift({id:Date.now().toString(),type,detail,userId,
          timestamp:new Date().toISOString(),
          ip:'[browser-only]',ua:navigator.userAgent.slice(0,80)});
        localStorage.setItem(SEC_LOG_KEY,JSON.stringify(logs.slice(0,500)));
      }catch{}
    }
    function getSecurityLogs(){try{return JSON.parse(localStorage.getItem(SEC_LOG_KEY)||'[]');}catch{return[];}}

    // ── Input Validators ──────────────────────────────────────────
    function validateEmail(e){return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
    function validatePassword(p){
      return{
        length:p.length>=8,
        upper:/[A-Z]/.test(p),
        lower:/[a-z]/.test(p),
        digit:/[0-9]/.test(p),
        special:/[!@#$%^&*()_+\-=\[\]{}|;:,.<>?]/.test(p),
        score:([p.length>=8,/[A-Z]/.test(p),/[a-z]/.test(p),/[0-9]/.test(p),/[!@#$%^&*]/.test(p)].filter(Boolean).length)
      };
    }
    function passwordStrengthLabel(score){
      return[
        {label:'Очень слабый',color:'#c0392b'},
        {label:'Слабый',color:'#e67e22'},
        {label:'Средний',color:'#f39c12'},
        {label:'Хороший',color:'#27ae60'},
        {label:'Надёжный',color:'#2ecc71'},
      ][Math.min(score,4)];
    }

    // ── Users DB (hashed passwords) ───────────────────────────────
    function getUsersDB(){try{return JSON.parse(localStorage.getItem(USERS_KEY)||'[]');}catch{return[];}}
    function saveUsersDB(users){localStorage.setItem(USERS_KEY,JSON.stringify(users));}

    // ══════════════════════════════════════════════════════════════
    // 🖥️ BACKEND SIMULATION (Express-style middleware + routes)
    // ══════════════════════════════════════════════════════════════

    // ── Middleware stack ──────────────────────────────────────────
    async function middlewareAuth(req){
      const token=localStorage.getItem(TK);
      if(!token) throw new Error('401: Не авторизован');
      const payload=parseToken(token);
      if(!payload) throw new Error('401: Токен истёк — войдите заново');
      req.user=payload;
      return req;
    }
    function middlewareValidate(fields,body){
      for(const f of fields){
        if(!body[f]||String(body[f]).trim()==='')
          throw new Error(`400: Поле "${f}" обязательно`);
      }
    }
    function middlewareSanitize(body){
      const safe={};
      for(const k of Object.keys(body))
        safe[k]=typeof body[k]==='string'?sanitize(body[k].trim()):body[k];
      return safe;
    }

    // ── Auth routes ───────────────────────────────────────────────
    async function backendRegister(rawBody){
      const body=middlewareSanitize(rawBody);
      middlewareValidate(['name','email','password'],body);
      if(!validateEmail(body.email)) throw new Error('400: Некорректный email');
      const pwCheck=validatePassword(body.password);
      if(pwCheck.score<2) throw new Error('400: Пароль слишком слабый. Минимум 8 символов с буквами и цифрами');
      const users=getUsersDB();
      if(users.find(u=>u.email===body.email)) throw new Error('409: Пользователь с таким email уже существует');
      const{hash,salt}=await hashPassword(body.password);
      const userId='u_'+Date.now();
      const user={id:userId,name:body.name,email:body.email,passwordHash:hash,passwordSalt:salt,
        createdAt:new Date().toISOString(),totalPoints:0,rankLabel:'🌱 Новичок',avatarEmoji:'☕',role:'student'};
      users.push(user);saveUsersDB(users);
      logSecurityEvent('REGISTER',`Новый пользователь: ${body.email}`,userId);
      const token=generateToken(userId,body.email);
      const{passwordHash:_,passwordSalt:__,...safeUser}=user;
      return{token,user:safeUser};
    }
    async function backendLogin(rawBody){
      const body=middlewareSanitize(rawBody);
      middlewareValidate(['email','password'],body);
      // Rate limit check
      const rl=checkRateLimit(body.email);
      if(!rl.allowed) throw new Error(`429: Слишком много попыток. Подождите ${rl.waitMinutes} мин.`);
      const users=getUsersDB();
      const user=users.find(u=>u.email===body.email);
      if(!user){
        recordFailedAttempt(body.email);
        logSecurityEvent('LOGIN_FAIL',`Неизвестный email: ${body.email}`);
        throw new Error('401: Неверный email или пароль');
      }
      const ok=await verifyPassword(body.password,user.passwordHash,user.passwordSalt);
      if(!ok){
        recordFailedAttempt(body.email);
        logSecurityEvent('LOGIN_FAIL',`Неверный пароль для: ${body.email}`,user.id);
        const remaining=checkRateLimit(body.email).remaining;
        throw new Error(`401: Неверный пароль. Осталось попыток: ${remaining}`);
      }
      clearRateLimit(body.email);
      logSecurityEvent('LOGIN_SUCCESS',`Вход выполнен: ${body.email}`,user.id);
      const token=generateToken(user.id,user.email);
      const{passwordHash:_,passwordSalt:__,...safeUser}=user;
      return{token,user:safeUser};
    }
    async function backendGoogleAuth(rawBody){
      const body=middlewareSanitize(rawBody);
      middlewareValidate(['email','name'],body);
      const users=getUsersDB();
      let user=users.find(u=>u.email===body.email);
      if(!user){
        const userId='u_g_'+Date.now();
        user={id:userId,name:body.name,email:body.email,passwordHash:null,passwordSalt:null,
          googleId:body.googleId,createdAt:new Date().toISOString(),
          totalPoints:0,rankLabel:'🌱 Новичок',avatarEmoji:'☕',role:'student'};
        users.push(user);saveUsersDB(users);
        logSecurityEvent('REGISTER_GOOGLE',`Google auth: ${body.email}`,userId);
      }
      logSecurityEvent('LOGIN_GOOGLE',`Google login: ${body.email}`,user.id);
      const token=generateToken(user.id,user.email);
      const{passwordHash:_,passwordSalt:__,...safeUser}=user;
      return{token,user:safeUser};
    }

    // ── Backend router ────────────────────────────────────────────
    async function api(method,path,body=null){
      // Route matching (backend-in-browser)
      if(path==='/api/auth/register'&&method==='POST') return backendRegister(body);
      if(path==='/api/auth/login'&&method==='POST') return backendLogin(body);
      if(path==='/api/auth/google'&&method==='POST') return backendGoogleAuth(body);
      // Protected routes — check auth middleware
      const req={method,path,body};
      try{await middlewareAuth(req);}catch(e){throw new Error(e.message);}
      // Quiz routes (localStorage-backed, auth-protected)
      if(path==='/api/quizzes/public'&&method==='GET'){
        const pub=JSON.parse(localStorage.getItem(PUB_TESTS_KEY)||'[]');
        return pub.filter(q=>q.publishedToCatalog);
      }
      if(path==='/api/quizzes/my'&&method==='GET'){
        const all=JSON.parse(localStorage.getItem(MY_TESTS_KEY)||'[]');
        return all.filter(q=>q.creatorId===req.user?.sub);
      }
      if(path==='/api/quizzes'&&method==='POST'){
        const quiz=middlewareSanitize({...body,creatorId:req.user?.sub});
        return quiz;
      }
      if(path.startsWith('/api/quizzes/')&&method==='DELETE'){
        logSecurityEvent('QUIZ_DELETE',`Quiz deleted: ${path}`,req.user?.sub);
        return{ok:true};
      }
      // Fallback: network (won't work offline, graceful fail)
      const token=localStorage.getItem(TK);
      const opts={method,headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{})}};
      if(body) opts.body=JSON.stringify(body);
      try{
        const res=await fetch(path,opts);
        const data=await res.json().catch(()=>({}));
        if(!res.ok) throw new Error(data.error||'Ошибка сервера');
        return data;
      }catch(e){throw new Error(e.message);}
    }

    // ── Password Strength Indicator component ─────────────────────
    function PasswordStrength({password}){
      if(!password) return null;
      const v=validatePassword(password);
      const{label,color}=passwordStrengthLabel(v.score);
      const checks=[
        {ok:v.length,text:'Минимум 8 символов'},
        {ok:v.upper,text:'Заглавная буква (A-Z)'},
        {ok:v.lower,text:'Строчная буква (a-z)'},
        {ok:v.digit,text:'Цифра (0-9)'},
        {ok:v.special,text:'Спецсимвол (!@#$...)'},
      ];
      return(
        <div style={{marginTop:6}}>
          <div style={{display:'flex',gap:4,marginBottom:5}}>
            {[1,2,3,4,5].map(i=>(
              <div key={i} style={{flex:1,height:4,borderRadius:99,background:i<=v.score?color:'var(--border)',transition:'background .3s'}}/>
            ))}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <span style={{fontSize:11.5,fontWeight:700,color}}>🔐 {label}</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px 10px'}}>
            {checks.map(c=>(
              <div key={c.text} style={{fontSize:11,color:c.ok?'var(--green)':'var(--text3)',display:'flex',alignItems:'center',gap:4}}>
                <span>{c.ok?'✓':'○'}</span>{c.text}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── Security Dashboard Page ───────────────────────────────────
    function SecurityPage({user}){
      const logs=getSecurityLogs().filter(l=>!user||l.userId===user.id||!l.userId);
      const[showAll,setShowAll]=useState(false);
      const displayed=showAll?logs:logs.slice(0,10);
      const rl=checkRateLimit(user?.email||'');
      const tokenValid=isTokenValid();
      const pwCheck=user?.passwordHash===null;

      const icons={
        LOGIN_SUCCESS:'✅',LOGIN_FAIL:'❌',REGISTER:'🆕',REGISTER_GOOGLE:'🔵',
        LOGIN_GOOGLE:'🔵',QUIZ_DELETE:'🗑️',default:'⚠️'
      };
      const colors={
        LOGIN_SUCCESS:'var(--green)',LOGIN_FAIL:'var(--red)',REGISTER:'var(--blue)',
        REGISTER_GOOGLE:'var(--blue)',LOGIN_GOOGLE:'var(--blue)',QUIZ_DELETE:'var(--accent)',default:'var(--text3)'
      };
      function fmtDate(iso){
        const d=new Date(iso);
        return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
      }

      const secChecks=[
        {ok:tokenValid,label:'JWT-токен действителен',desc:'Сессия активна и не истекла',icon:'🔑'},
        {ok:rl.allowed,label:'Аккаунт не заблокирован',desc:rl.allowed?`Осталось попыток: ${rl.remaining}/5`:`Заблокирован на ${rl.waitMinutes} мин`,icon:'🛡️'},
        {ok:!pwCheck,label:'Пароль зашифрован (SHA-256)',desc:pwCheck?'Google-авторизация (без пароля)':'Пароль хеширован с солью',icon:'🔐'},
        {ok:true,label:'localStorage зашифрован (AES-GCM)',desc:'Данные сессии защищены шифрованием',icon:'💾'},
        {ok:true,label:'XSS-защита активна',desc:'Все входные данные санитизируются',icon:'🧹'},
        {ok:true,label:'CSRF-защита',desc:'Токены привязаны к сессии',icon:'🔒'},
      ];
      const passed=secChecks.filter(c=>c.ok).length;

      return(
        <div style={{maxWidth:860,margin:'0 auto',padding:22}}>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:23,fontWeight:900,color:'var(--text)',marginBottom:6}}>🛡️ Безопасность</h1>
          <p style={{color:'var(--text3)',fontSize:13,marginBottom:20}}>Статус защиты аккаунта и системы</p>

          {/* Security Score */}
          <div style={{background:'linear-gradient(135deg,var(--bg2),var(--bg3))',border:'1px solid var(--border)',borderRadius:16,padding:'22px 26px',marginBottom:16,display:'flex',alignItems:'center',gap:22}}>
            <div style={{width:80,height:80,borderRadius:'50%',background:`conic-gradient(var(--green) ${passed/secChecks.length*360}deg, var(--border) 0deg)`,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',flexShrink:0}}>
              <div style={{width:60,height:60,borderRadius:'50%',background:'var(--card)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:900,color:'var(--green)'}}>{Math.round(passed/secChecks.length*100)}%</span>
              </div>
            </div>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:900,color:'var(--text)',marginBottom:4}}>Оценка безопасности</div>
              <div style={{fontSize:13,color:'var(--text2)',marginBottom:10}}>{passed} из {secChecks.length} проверок пройдено</div>
              <div style={{background:'var(--border)',borderRadius:99,height:8,width:260}}>

    // ── PRIVATE TEST HELPERS ──────────────────────────────────────
    function generateAccessCode(){
      const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code='';
      for(let i=0;i<6;i++) code+=chars[Math.floor(Math.random()*chars.length)];
      return code;
    }
    function getPrivateTests(){try{return JSON.parse(localStorage.getItem(PRIV_TESTS_KEY)||"[]");}catch{return[];}}
    function savePrivateTest(t){
      const all=getPrivateTests();
      const idx=all.findIndex(x=>x.id===t.id);
      if(idx>=0) all[idx]=t; else all.push(t);
      localStorage.setItem(PRIV_TESTS_KEY,JSON.stringify(all));
    }
    function findPrivateByCode(code){return getPrivateTests().find(t=>t.accessCode===code.toUpperCase().trim());}
    function getPrivateResults(){try{return JSON.parse(localStorage.getItem(PRIV_RESULTS_KEY)||"[]");}catch{return[];}}
    function savePrivateResult(entry){
      const all=getPrivateResults();
      all.push(entry);
      localStorage.setItem(PRIV_RESULTS_KEY,JSON.stringify(all));
    }
    function getResultsForTest(testId){return getPrivateResults().filter(r=>r.testId===testId);}

    // ── PRIVATE CODE MODAL ────────────────────────────────────────
    function PrivateCodeModal({code,testTitle,onClose}){
      const[copied,setCopied]=useState(false);
      function copy(){navigator.clipboard.writeText(code).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});}
      return(
        <div style={{position:"fixed",inset:0,zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.6)",backdropFilter:"blur(6px)"}}/>
          <div className="pi" style={{position:"relative",background:"var(--card)",borderRadius:20,padding:"32px 36px",width:"min(92vw,420px)",boxShadow:"0 28px 90px rgba(0,0,0,.35)",textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:14}}>🔒</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:900,color:"var(--text)",marginBottom:6}}>Приватный тест создан</div>
            <div style={{fontSize:13,color:"var(--text3)",marginBottom:22}}>{testTitle}</div>
            <div style={{background:"var(--bg2)",border:"2px dashed var(--border2)",borderRadius:14,padding:"18px 20px",marginBottom:18}}>
              <div style={{fontSize:11,color:"var(--text3)",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Код доступа</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:38,fontWeight:900,color:"var(--accent)",letterSpacing:8}}>{code}</div>
              <div style={{fontSize:11.5,color:"var(--text3)",marginTop:8}}>Поделитесь этим кодом с участниками</div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={copy} style={{flex:1,background:copied?"var(--green)":"var(--accent)",color:"#fff",border:"none",borderRadius:10,padding:"12px",fontWeight:700,fontSize:14,cursor:"pointer",transition:"background .2s"}}>
                {copied?"✓ Скопировано!":"📋 Копировать код"}
              </button>
              <button onClick={onClose} style={{flex:"0 0 auto",background:"var(--bg2)",color:"var(--text2)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 18px",fontWeight:600,fontSize:14,cursor:"pointer"}}>Закрыть</button>
            </div>
          </div>
        </div>
      );
    }

    // ── ENTER PRIVATE CODE PAGE ───────────────────────────────────
    function EnterCodePage({onFound,onBack}){
      const[code,setCode]=useState("");
      const[err,setErr]=useState("");
      function submit(){
        const found=findPrivateByCode(code);
        if(!found){setErr("Тест с таким кодом не найден. Проверьте код и попробуйте снова.");return;}
        onFound(found);
      }
      return(
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:20}}>
          <div className="fu" style={{width:"min(92vw,400px)"}}>
            <button onClick={onBack} style={{background:"transparent",border:"none",color:"var(--text3)",fontSize:13,cursor:"pointer",marginBottom:20,display:"flex",alignItems:"center",gap:6}}>← Назад в каталог</button>
            <div style={{background:"var(--card)",borderRadius:20,padding:"36px 32px",boxShadow:"var(--shadow2)",textAlign:"center"}}>
              <div style={{fontSize:52,marginBottom:16}}>🔑</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,color:"var(--text)",marginBottom:8}}>Приватный тест</div>
              <div style={{fontSize:13.5,color:"var(--text3)",marginBottom:28}}>Введите код доступа, который вам выдал создатель теста</div>
              <input
                value={code}
                onChange={e=>setCode(e.target.value.toUpperCase())}
                onKeyDown={e=>e.key==="Enter"&&submit()}
                maxLength={6}
                placeholder="XXXXXX"
                style={{width:"100%",background:"var(--bg2)",border:"2px solid var(--border2)",borderRadius:12,padding:"16px",fontSize:28,fontFamily:"'Playfair Display',serif",fontWeight:900,letterSpacing:10,color:"var(--accent)",textAlign:"center",outline:"none",marginBottom:14,boxSizing:"border-box"}}
              />
              {err&&<div style={{background:"var(--red-bg)",border:"1px solid rgba(143,53,53,.22)",borderRadius:9,padding:"9px 13px",color:"var(--red)",fontSize:13,marginBottom:14}}>{err}</div>}
              <button onClick={submit} style={{width:"100%",background:"var(--accent)",color:"#fff",border:"none",borderRadius:11,padding:"14px",fontWeight:700,fontSize:15,cursor:"pointer"}}>🔓 Войти в тест</button>
            </div>
          </div>
        </div>
      );
    }

    function PrivateResultsPanel({test,onClose}){
      const results=getResultsForTest(test.id);
      function fmtDate(iso){const d=new Date(iso);return d.toLocaleDateString("ru-RU",{day:"2-digit",month:"short"})+" "+d.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});}
      const avg=results.length?Math.round(results.reduce((s,r)=>s+r.score,0)/results.length):0;
      const passed=results.filter(r=>r.passed).length;
      return(
        <div style={{position:"fixed",inset:0,zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",backdropFilter:"blur(5px)"}}/>

            <div style={{padding:"18px 24px",borderBottom:"1px solid var(--border)",background:"var(--bg2)",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:18,color:"var(--text)"}}>📊 Результаты участников</div>

              </div>
              <button onClick={onClose} style={{background:"transparent",border:"none",fontSize:20,color:"var(--text3)",cursor:"pointer"}}>✕</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"18px 24px"}}>
              {results.length===0?(
                <div style={{textAlign:"center",padding:"60px 0",color:"var(--text3)"}}>
                  <div style={{fontSize:40,marginBottom:12}}>📭</div>
                  <div style={{fontSize:15,fontWeight:600}}>Никто ещё не прошёл этот тест</div>
                  <div style={{fontSize:13,marginTop:6}}>Поделитесь кодом <span style={{fontWeight:800,color:"var(--accent)"}}>{test.accessCode}</span> с участниками</div>
                </div>
              ):(
                <>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
                    {[["👥","Участников",results.length,"var(--blue)"],["📊","Средний балл",`${avg}%`,"var(--accent)"],["✅","Сдали",`${passed}/${results.length}`,"var(--green)"]].map(([ic,l,v,col])=>(
                      <div key={l} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
                        <div style={{fontSize:22,marginBottom:4}}>{ic}</div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,color:col}}>{v}</div>
                        <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{l}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontWeight:700,fontSize:13.5,color:"var(--text)",marginBottom:11}}>📋 Список участников</div>
                  {results.sort((a,b)=>b.score-a.score).map((r,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 16px",marginBottom:8}}>
                      <div style={{width:30,textAlign:"center",fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:"var(--text3)"}}>#{i+1}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,color:"var(--text)",fontSize:13.5}}>{r.userName}</div>
                        <div style={{color:"var(--text3)",fontSize:11.5,marginTop:2}}>{fmtDate(r.date)} · {r.correct}/{r.total} верных · {Math.floor(r.timeSpent/60)}:{String(r.timeSpent%60).padStart(2,"0")}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:900,color:r.score>=75?"var(--green)":r.score>=60?"var(--accent)":"var(--red)"}}>{r.score}%</div>
                        <div style={{fontSize:10.5,fontWeight:700,color:r.passed?"var(--green)":"var(--red)"}}>{r.passed?"✓ Сдал":"✗ Не сдал"}</div>
                      </div>
                    </div>
                  ))}
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    function getHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[];}catch{return[];}}
    function saveAttempt(quizId,quizTitle,quizEmoji,result){
      const history=getHistory();
      const attempt={id:Date.now().toString(),quizId,quizTitle,quizEmoji,date:new Date().toISOString(),
        score:result.score,correct:result.correct,total:result.total,timeSpent:result.timeSpent,
        answers:result.answers||{},passed:result.score>=(result.passingScore||60)};
      history.unshift(attempt);
      localStorage.setItem(HISTORY_KEY,JSON.stringify(history.slice(0,200)));
      return attempt;
    }
    function getUnlocked(history,quizzes){return ACHIEVEMENTS.filter(a=>a.check(history,quizzes)).map(a=>a.id);}

    // ── LocalStorage helpers for my tests ─────────────────────────
    function getMyLocalTests(userId){
      try{
        const all=JSON.parse(localStorage.getItem(MY_TESTS_KEY)||'[]');
        return all.filter(t=>!userId||t.creatorId===userId);
      }catch{return[];}
    }
    function saveMyLocalTest(test,userId){
      try{
        const all=JSON.parse(localStorage.getItem(MY_TESTS_KEY)||'[]');
        const idx=all.findIndex(t=>t.id===test.id);
        const entry={...test,creatorId:userId};
        if(idx>=0) all[idx]=entry; else all.push(entry);
        localStorage.setItem(MY_TESTS_KEY,JSON.stringify(all));
        // also update published tests list if published
        if(test.publishedToCatalog){
          const pub=JSON.parse(localStorage.getItem(PUB_TESTS_KEY)||'[]');
          const pi=pub.findIndex(t=>t.id===test.id);
          if(pi>=0) pub[pi]=entry; else pub.push(entry);
          localStorage.setItem(PUB_TESTS_KEY,JSON.stringify(pub));
        } else {
          // remove from published if unpublished
          const pub=JSON.parse(localStorage.getItem(PUB_TESTS_KEY)||'[]');
          localStorage.setItem(PUB_TESTS_KEY,JSON.stringify(pub.filter(t=>t.id!==test.id)));
        }
      }catch(e){}
    }
    function deleteMyLocalTest(id){
      try{
        const all=JSON.parse(localStorage.getItem(MY_TESTS_KEY)||'[]');
        localStorage.setItem(MY_TESTS_KEY,JSON.stringify(all.filter(t=>t.id!==id)));
        const pub=JSON.parse(localStorage.getItem(PUB_TESTS_KEY)||'[]');
        localStorage.setItem(PUB_TESTS_KEY,JSON.stringify(pub.filter(t=>t.id!==id)));
      }catch{}
    }

      const weights={fullscreen_exit:20,tab_switch:15,multiple_faces:25,no_face:10,look_away:8,copy_paste:12,right_click:5};

    function generateLocalQuiz(topic,category,difficulty,qCount){
      const bank=LOCAL_TEMPLATES[category]||LOCAL_TEMPLATES["Python"];
      const shuffled=[...bank].sort(()=>Math.random()-.5).slice(0,Math.min(qCount,bank.length));
      const questions=shuffled.map((q,i)=>({...q,id:"local_"+Date.now()+"_"+i}));
      const diffTimers={EASY:15,MEDIUM:20,HARD:25,EXPERT:30};
      const diffPass={EASY:60,MEDIUM:65,HARD:70,EXPERT:75};
      return{title:topic||`${category}: тест знаний`,description:`Тест по теме «${topic||category}»`,emoji:CAT_EMOJIS[category]||"💻",coverColor:COVER_COLORS[category]||"#8b6914",timerMinutes:diffTimers[difficulty]||20,passingScore:diffPass[difficulty]||65,category,difficulty,questions};
    }
    function AIQuizGenerator({onClose,onApply}){
      const[topic,setTopic]=useState("");
      const[category,setCategory]=useState("Python");
      const[difficulty,setDifficulty]=useState("MEDIUM");
      const[qCount,setQCount]=useState(5);
      const[loading,setLoading]=useState(false);
      const[preview,setPreview]=useState(null);
      const[error,setError]=useState("");
      const[editingQ,setEditingQ]=useState(null);
      const[useLocal,setUseLocal]=useState(false);
      const CATS2=Object.keys(CAT_EMOJIS);
      const IS={background:"var(--bg2)",border:"1.5px solid var(--border)",borderRadius:10,padding:"10px 13px",fontSize:13.5,color:"var(--text)",width:"100%",fontFamily:"'DM Sans',sans-serif",outline:"none"};
      async function generate(){
        if(!topic.trim()&&!category){setError("Введите тему или выберите категорию");return;}
        setError("");setLoading(true);setPreview(null);
        if(useLocal){await new Promise(r=>setTimeout(r,600));setPreview(generateLocalQuiz(topic,category,difficulty,qCount));setLoading(false);return;}
        try{
          const prompt=`Создай тест по теме "${topic||category}" для категории "${category}", сложность "${difficulty}". Создай ровно ${qCount} вопросов. Верни ТОЛЬКО валидный JSON объект без markdown и backticks:\n{"title":"название","description":"описание","emoji":"эмодзи","coverColor":"#hex","timerMinutes":20,"passingScore":65,"questions":[{"id":"q1","text":"вопрос?","type":"SINGLE_CHOICE","points":1,"options":["а","б","в","г"],"correctAnswerIndices":[0]}]}\nДля TRUE_FALSE options всегда ["Верно","Неверно"]. Только JSON, никакого текста вокруг.`;
          const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:prompt}]})});
          if(!res.ok){
            const errData=await res.json().catch(()=>({}));
            const msg=errData?.error?.message||"Ошибка API";
            if(res.status===429) throw new Error("Сервер перегружен, попробуйте через минуту");
            throw new Error(msg);
          }
          const data=await res.json();
          if(data.error) throw new Error(data.error.message||"api_error");
          let raw=(data.content||[]).map(i=>i.text||"").join("").replace(/```json|```/g,"").trim();
          const parsed=JSON.parse(raw);
          if(!parsed.questions||!Array.isArray(parsed.questions)||parsed.questions.length===0) throw new Error("no_questions");
          setPreview({...parsed,category,difficulty});
        }catch(e){
          setPreview(generateLocalQuiz(topic,category,difficulty,qCount));
        }
        setLoading(false);
      }
      function deleteQ(id){setPreview(p=>({...p,questions:p.questions.filter(q=>q.id!==id)}));}
      function saveEditQ(q){setPreview(p=>({...p,questions:p.questions.map(x=>x.id===q.id?q:x)}));setEditingQ(null);}
      return(
        <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",backdropFilter:"blur(5px)"}}/>

                          {qt.label}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div><div style={{fontSize:11.5,color:"var(--text3)",fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:.8}}>Тема теста (необязательно)</div><input value={topic} onChange={e=>setTopic(e.target.value)} onKeyDown={e=>e.key==="Enter"&&generate()} placeholder="Например: async/await, JOIN в SQL, деревья..." style={{...IS,fontSize:15}}/></div>

                  </div>
                  {error&&<div style={{background:"var(--red-bg)",border:"1px solid rgba(143,53,53,.22)",borderRadius:9,padding:"10px 14px",color:"var(--red)",fontSize:13,fontWeight:600}}>{error}</div>}
                  {loading?<div style={{textAlign:"center",padding:"36px 0"}}><div style={{width:44,height:44,border:"3px solid var(--border)",borderTopColor:"var(--accent)",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 14px"}}/><div style={{color:"var(--text2)",fontSize:14,fontWeight:600}}>Генерирую тест...</div></div>
                  :<Bt onClick={generate} sz="lg" style={{width:"100%"}}>🤖 Сгенерировать тест</Bt>}
                </div>
              ):(
                <div>
                  <div style={{background:preview.coverColor||"var(--accent)",borderRadius:12,padding:"18px 20px",marginBottom:18,display:"flex",alignItems:"center",gap:14}}>
                    <span style={{fontSize:36}}>{preview.emoji||"📝"}</span>
                    <div>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:900,color:"#fff"}}>{preview.title}</div>
                      <div style={{display:"flex",gap:8,marginTop:8}}>{[`${preview.questions?.length} вопр.`,`${preview.timerMinutes} мин`,`${preview.passingScore}%`].map(t=><span key={t} style={{background:"rgba(255,255,255,.18)",color:"#fff",borderRadius:99,padding:"2px 9px",fontSize:11,fontWeight:600}}>{t}</span>)}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13}}>
                    <div style={{fontWeight:700,color:"var(--text)",fontSize:14}}>Вопросы ({preview.questions?.length})</div>
                    <button onClick={()=>setPreview(null)} style={{background:"transparent",border:"1px solid var(--border)",borderRadius:8,padding:"5px 12px",color:"var(--text3)",fontSize:12.5,cursor:"pointer"}}>← Заново</button>
                  </div>

                    <div key={q.id} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:11,padding:"13px 15px",marginBottom:9}}>

                          </div>
                        </>
                      )}
                    </div>
                  ))}
                  <div style={{display:"flex",gap:9,marginTop:6}}>
                    <Bt onClick={()=>onApply(preview)} col="var(--green)" style={{flex:1}}>✓ Использовать этот тест</Bt>
                    <Bt onClick={()=>setPreview(null)} outline style={{flex:"0 0 auto"}}>↺ Заново</Bt>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }
    function AIQEditor({q,onSave,onCancel}){
      const[text,setText]=useState(q.text);
      const[options,setOptions]=useState(q.options||[]);
      const[correct,setCorrect]=useState(q.correctAnswerIndices||[]);
      const[points,setPoints]=useState(q.points||1);
      return(
        <div>
          <textarea value={text} onChange={e=>setText(e.target.value)} rows={2} style={{width:"100%",background:"var(--card)",border:"1.5px solid var(--accent)",borderRadius:8,padding:"8px 11px",fontSize:13.5,color:"var(--text)",resize:"vertical",marginBottom:8,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>

            <div key={oi} style={{display:"flex",gap:7,marginBottom:5,alignItems:"center"}}>
              <input type="checkbox" checked={correct.includes(oi)} onChange={()=>setCorrect(c=>c.includes(oi)?c.filter(i=>i!==oi):[...c,oi])} style={{accentColor:"var(--accent)",width:14,height:14}}/>
              <input value={opt} onChange={e=>setOptions(o=>o.map((x,i)=>i===oi?e.target.value:x))} style={{flex:1,background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,padding:"5px 9px",fontSize:13,color:"var(--text)",fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>

            <Bt onClick={()=>onSave({...q,text,options,correctAnswerIndices:correct,points})} col="var(--green)" sz="sm">✓ Готово</Bt>

    }

    // ── ANSWER REVIEW ─────────────────────────────────────────────
    function AnswerReview({quiz,userAnswers,onClose}){
      const qs=Array.isArray(quiz.questions)?quiz.questions:[];
      const[expanded,setExpanded]=useState(null);
      function isCorrect(q){
        const a=userAnswers[q.id];
        if(q.type==="SINGLE_CHOICE"||q.type==="TRUE_FALSE") return a===q.correctAnswerIndices?.[0];
        if(q.type==="MULTIPLE_CHOICE"){const s=Array.isArray(a)?[...a].sort():[];const e=[...(q.correctAnswerIndices||[])].sort();return JSON.stringify(s)===JSON.stringify(e);}
        if(q.type==="OPEN_TEXT") return typeof a==="string"&&a.trim().toLowerCase()===q.correctTextAnswer?.toLowerCase();
        return false;
      }
      const correct=qs.filter(q=>isCorrect(q));
      const wrong=qs.filter(q=>!isCorrect(q));
      return(
        <div style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",backdropFilter:"blur(4px)"}}/>
          <div style={{position:"relative",width:"min(94vw,720px)",maxHeight:"90vh",background:"var(--card)",borderRadius:20,boxShadow:"0 24px 80px rgba(0,0,0,.28)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"18px 22px",borderBottom:"1px solid var(--border)",background:"var(--bg2)",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:18,color:"var(--text)"}}>🔍 Разбор ответов</div><div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>{quiz.title}</div></div>
              <div style={{display:"flex",gap:9,alignItems:"center"}}>
                <span style={{background:"var(--green-bg)",color:"var(--green)",borderRadius:99,padding:"3px 11px",fontSize:12,fontWeight:700}}>✓ {correct.length}</span>
                <span style={{background:"var(--red-bg)",color:"var(--red)",borderRadius:99,padding:"3px 11px",fontSize:12,fontWeight:700}}>✗ {wrong.length}</span>
                <button onClick={onClose} style={{background:"transparent",border:"none",fontSize:20,color:"var(--text3)",cursor:"pointer"}}>✕</button>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
              {wrong.length>0&&<div style={{marginBottom:18}}><div style={{fontWeight:700,color:"var(--red)",fontSize:12.5,letterSpacing:.4,textTransform:"uppercase",marginBottom:9}}>✗ Ошибки ({wrong.length})</div>{wrong.map(q=><ReviewQ key={q.id} q={q} userAns={userAnswers[q.id]} isCorrect={false} num={qs.indexOf(q)+1} expanded={expanded===q.id} onToggle={()=>setExpanded(e=>e===q.id?null:q.id)}/>)}</div>}
              {correct.length>0&&<div><div style={{fontWeight:700,color:"var(--green)",fontSize:12.5,letterSpacing:.4,textTransform:"uppercase",marginBottom:9}}>✓ Верные ответы ({correct.length})</div>{correct.map(q=><ReviewQ key={q.id} q={q} userAns={userAnswers[q.id]} isCorrect={true} num={qs.indexOf(q)+1} expanded={expanded===q.id} onToggle={()=>setExpanded(e=>e===q.id?null:q.id)}/>)}</div>}
            </div>
          </div>
        </div>
      );
    }
    function ReviewQ({q,userAns,isCorrect,num,expanded,onToggle}){
      const border=isCorrect?"rgba(61,122,82,.3)":"rgba(143,53,53,.3)";
      const bg=isCorrect?"var(--green-bg)":"var(--red-bg)";
      const col=isCorrect?"var(--green)":"var(--red)";
      function wasSelected(i){if(q.type==="MULTIPLE_CHOICE")return Array.isArray(userAns)&&userAns.includes(i);return userAns===i;}
      return(
        <div style={{border:`1.5px solid ${border}`,borderRadius:11,marginBottom:8,overflow:"hidden"}}>
          <div onClick={onToggle} style={{padding:"11px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,background:bg}}>
            <span style={{fontSize:14,color:col,fontWeight:800,flexShrink:0}}>{isCorrect?"✓":"✗"}</span>
            <div style={{flex:1,fontWeight:600,color:"var(--text)",fontSize:13.5,lineHeight:1.4}}><span style={{color:"var(--text3)",fontSize:11,fontWeight:700,marginRight:6}}>#{num}</span>{q.text}</div>
            <span style={{color:"var(--text3)",fontSize:14}}>{expanded?"▲":"▼"}</span>
          </div>
          {expanded&&<div style={{padding:"13px 14px",background:"var(--card)",borderTop:`1px solid ${border}`}}>
            {(q.options||[]).map((opt,i)=>{
              const isRight=(q.correctAnswerIndices||[]).includes(i);
              const selected=wasSelected(i);
              let bg2="var(--bg2)",col2="var(--text2)",border2="var(--border)";
              if(isRight){bg2="var(--green-bg)";col2="var(--green)";border2="rgba(61,122,82,.3)";}
              if(selected&&!isRight){bg2="var(--red-bg)";col2="var(--red)";border2="rgba(143,53,53,.3)";}
              return <div key={i} style={{background:bg2,border:`1.5px solid ${border2}`,borderRadius:8,padding:"8px 12px",marginBottom:5,color:col2,fontSize:13,display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontWeight:800,flexShrink:0}}>{isRight?"✓":selected?"✗":"○"}</span>{opt}
                {isRight&&selected&&<span style={{marginLeft:"auto",fontSize:10.5,fontWeight:700}}>Ваш ответ ✓</span>}
                {isRight&&!selected&&<span style={{marginLeft:"auto",fontSize:10.5,fontWeight:700}}>Правильный</span>}
                {!isRight&&selected&&<span style={{marginLeft:"auto",fontSize:10.5,fontWeight:700}}>Ваш ответ ✗</span>}
              </div>;
            })}
          </div>}
        </div>
      );
    }

                    <div key={key} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"9px 12px",borderRadius:9,background:"var(--bg2)",border:"1px solid var(--border)"}}>

    function ProctoringReport({report,quizTitle,onClose}){
      if(!report) return null;
      const suspColor=report.suspicionScore<30?"var(--green)":report.suspicionScore<60?"var(--accent)":"var(--red)";
      const suspBg=report.suspicionScore<30?"var(--green-bg)":report.suspicionScore<60?"var(--accent-bg)":"var(--red-bg)";
      const verdict=report.suspicionScore<30?"✅ Нарушений не выявлено":report.suspicionScore<60?"⚠️ Выявлены подозрительные действия":"🚨 Высокая вероятность нарушений";
      const icons={fullscreen_exit:"⛶",tab_switch:"🗂️",multiple_faces:"👥",no_face:"👻",look_away:"👀",copy_paste:"📋",right_click:"🖱️"};
      return(
        <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",backdropFilter:"blur(5px)"}}/>
          <div style={{position:"relative",width:"min(94vw,700px)",maxHeight:"90vh",background:"var(--card)",borderRadius:20,boxShadow:"var(--shadow2)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"18px 22px",borderBottom:"1px solid var(--border)",background:"var(--bg2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:18,color:"var(--text)"}}>🛡️ Отчёт прокторинга</div><div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>{quizTitle}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{background:suspBg,color:suspColor,borderRadius:99,padding:"4px 14px",fontSize:12.5,fontWeight:700}}>{report.suspicionScore}% подозрений</span>
                <button onClick={onClose} style={{background:"transparent",border:"none",fontSize:20,color:"var(--text3)",cursor:"pointer"}}>✕</button>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"18px 22px"}}>
              <div style={{background:suspBg,border:`1.5px solid ${suspColor}33`,borderRadius:10,padding:"13px 16px",marginBottom:18,color:suspColor,fontWeight:700,fontSize:14}}>{verdict}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
                {[["⛶","Fullscreen",report.fullscreenExits],["🗂️","Смен вкладки",report.tabSwitches],["👥","Доп. лиц",report.multipleFaces],["👻","Нет лица",report.noFaceEvents],["📋","Копирований",report.copyPasteAttempts],["⚠️","Всего событий",report.events.length]].map(([icon,label,val])=>(
                  <div key={label} style={{background:"var(--bg2)",borderRadius:10,padding:"13px 10px",textAlign:"center",border:`1px solid ${val===0?"var(--border)":"rgba(143,53,53,.2)"}`}}>

                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:900,color:val===0?"var(--green)":"var(--red)"}}>{val}</div>
                    <div style={{fontSize:10,color:"var(--text3)",marginTop:3,lineHeight:1.3}}>{label}</div>
                  </div>
                ))}
              </div>
              <div style={{fontWeight:700,fontSize:13,color:"var(--text)",marginBottom:11}}>📋 Таймлайн ({report.events.length})</div>
              {report.events.length===0
                ?<div style={{textAlign:"center",padding:"28px 0",color:"var(--green)",fontSize:14}}>✅ Нарушений не зафиксировано</div>
                :report.events.map((ev,i)=>{
                  const sev=["fullscreen_exit","tab_switch","multiple_faces"].includes(ev.type);
                  return <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:sev?"var(--red-bg)":"var(--accent-bg)",borderRadius:9,padding:"9px 13px",marginBottom:6,border:`1px solid ${sev?"rgba(143,53,53,.15)":"rgba(139,105,20,.15)"}`}}>
                    <span style={{fontSize:15}}>{icons[ev.type]||"⚠️"}</span>
                    <div style={{flex:1,fontSize:12.5,fontWeight:600,color:sev?"var(--red)":"var(--accent)"}}>{ev.detail}</div>
                    <span style={{fontSize:11,color:sev?"var(--red)":"var(--accent)",fontWeight:700,flexShrink:0}}>{ev.ts}</span>
                  </div>;
                })
              }
            </div>
          </div>
        </div>
      );
    }
