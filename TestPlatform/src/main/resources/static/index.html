    // ── QUIZ SESSION ──────────────────────────────────────────────
    function QuizSession({quiz,onFinish,onExit}){
      const qs=Array.isArray(quiz.questions)?quiz.questions:[];
      const[idx,setIdx]=useState(0);
      const[ans,setAns]=useState({});
      const[tLeft,setTLeft]=useState((quiz.timerMinutes||20)*60);
      const[done,setDone]=useState(false);
      useEffect(()=>{
        if(done) return;
        const t=setInterval(()=>setTLeft(s=>{if(s<=1){clearInterval(t);finish();return 0;}return s-1;}),1000);
        return()=>clearInterval(t);
      },[done]);
      function finish(){
        setDone(true);
        let ok=0,tot=0;
        qs.forEach(q=>{
          const p=q.points||1;tot+=p;const a=ans[q.id];
          if(q.type==="SINGLE_CHOICE"&&a===q.correctAnswerIndices?.[0]) ok+=p;
          else if(q.type==="TRUE_FALSE"&&a===q.correctAnswerIndices?.[0]) ok+=p;
          else if(q.type==="MULTIPLE_CHOICE"){const s=Array.isArray(a)?[...a].sort():[];const e=[...(q.correctAnswerIndices||[])].sort();if(JSON.stringify(s)===JSON.stringify(e)) ok+=p;}
          else if(q.type==="OPEN_TEXT"&&typeof a==="string"&&a.trim().toLowerCase()===q.correctTextAnswer?.toLowerCase()) ok+=p;
        });
        const score=tot>0?Math.round(ok/tot*100):0;
        const passingScore=quiz.passingScore||60;
        onFinish({score,correct:ok,total:tot,timeSpent:(quiz.timerMinutes||20)*60-tLeft,answers:ans,passed:score>=passingScore,passingScore});
      }
      if(done) return <div style={{padding:80,textAlign:"center"}}><Spin/></div>;
      const q=qs[idx];
      const mm=Math.floor(tLeft/60),ss=String(tLeft%60).padStart(2,"0");
      const urgent=tLeft<60;
      return(
        <div style={{maxWidth:660,margin:"0 auto",padding:22}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <div><div style={{color:"var(--accent)",fontWeight:700,fontSize:11.5,letterSpacing:.6}}>ВОПРОС {idx+1} / {qs.length}</div><div style={{color:"var(--text2)",fontSize:12.5,marginTop:2}}>{quiz.title}</div></div>
            <div style={{display:"flex",alignItems:"center",gap:9}}>
              <div style={{background:urgent?"var(--red-bg)":"var(--accent-bg)",border:`1px solid ${urgent?"rgba(143,53,53,.3)":"rgba(139,105,20,.25)"}`,borderRadius:99,padding:"5px 13px",color:urgent?"var(--red)":"var(--accent)",fontWeight:700,fontSize:13,transition:"all .3s"}}>⏱ {mm}:{ss}</div>
              <Bt onClick={onExit} outline sz="sm" col="var(--text3)">✕</Bt>
            </div>
          </div>
          <div style={{background:"var(--border)",borderRadius:99,height:5,marginBottom:20}}>
            <div style={{width:`${(idx+1)/qs.length*100}%`,height:"100%",background:"linear-gradient(90deg,var(--accent),var(--accent2))",borderRadius:99,transition:"width .4s ease"}}/>
          </div>
          <Cd style={{padding:24,marginBottom:16,animation:"slideIn .3s ease"}}>
            <div style={{fontWeight:700,fontSize:16.5,color:"var(--text)",marginBottom:20,lineHeight:1.55}}>{q?.text}</div>
            {(q?.type==="SINGLE_CHOICE"||q?.type==="TRUE_FALSE")&&(q?.options||[]).map((opt,i)=>{
              const sel=ans[q.id]===i;
              return <div key={i} onClick={()=>setAns(a=>({...a,[q.id]:i}))} style={{border:`2px solid ${sel?"var(--accent)":"var(--border)"}`,background:sel?"var(--accent-bg)":"var(--bg2)",borderRadius:10,padding:"12px 15px",marginBottom:8,cursor:"pointer",transition:"all .15s",color:sel?"var(--accent)":"var(--text2)",display:"flex",alignItems:"center",gap:11,fontSize:14}}>
                <div style={{width:17,height:17,borderRadius:"50%",border:`2px solid ${sel?"var(--accent)":"var(--border2)"}`,background:sel?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sel&&<div style={{width:6,height:6,borderRadius:"50%",background:"#fff"}}/>}</div>
                {opt}
              </div>;
            })}
            {q?.type==="MULTIPLE_CHOICE"&&(q?.options||[]).map((opt,i)=>{
              const sel=(ans[q.id]||[]).includes(i);
              return <div key={i} onClick={()=>setAns(a=>{const c=a[q.id]||[];return{...a,[q.id]:c.includes(i)?c.filter(x=>x!==i):[...c,i]};})} style={{border:`2px solid ${sel?"var(--accent)":"var(--border)"}`,background:sel?"var(--accent-bg)":"var(--bg2)",borderRadius:10,padding:"12px 15px",marginBottom:8,cursor:"pointer",transition:"all .15s",color:sel?"var(--accent)":"var(--text2)",display:"flex",alignItems:"center",gap:11,fontSize:14}}>
                <div style={{width:17,height:17,borderRadius:5,border:`2px solid ${sel?"var(--accent)":"var(--border2)"}`,background:sel?"var(--accent)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,color:"#fff",fontWeight:800}}>{sel&&"✓"}</div>
                {opt}
              </div>;
            })}
            {q?.type==="OPEN_TEXT"&&<textarea value={ans[q.id]||""} onChange={e=>setAns(a=>({...a,[q.id]:e.target.value}))} placeholder="Введите ответ..." rows={3} style={{width:"100%",background:"var(--bg2)",border:"1.5px solid var(--border)",borderRadius:10,padding:"11px 14px",fontSize:14,color:"var(--text)",resize:"vertical",fontFamily:"'DM Sans',sans-serif"}}/>}
          </Cd>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <Bt onClick={()=>setIdx(i=>Math.max(0,i-1))} outline disabled={idx===0} sz="sm" col="var(--text3)">← Назад</Bt>
            {idx<qs.length-1?<Bt onClick={()=>setIdx(i=>i+1)} sz="sm">Далее →</Bt>:<Bt onClick={finish} col="var(--green)" sz="sm">✓ Завершить</Bt>}
          </div>
        </div>
      );
    }

    // ── QUIZ RESULT ───────────────────────────────────────────────
    function QuizResult({result,quiz,onRestart,onExit,proctoringReport}){
      const[showReview,setShowReview]=useState(false);
      const[showProctor,setShowProctor]=useState(false);
      const g=result.score>=90?"EXCELLENT":result.score>=75?"GOOD":result.score>=60?"PASS":"FAIL";
      const cf={EXCELLENT:{e:"🏆",l:"Отлично!",c:"var(--green)"},GOOD:{e:"⭐",l:"Хорошо!",c:"var(--blue)"},PASS:{e:"✅",l:"Зачёт",c:"var(--accent)"},FAIL:{e:"📉",l:"Не сдал",c:"var(--red)"}};
      const c=cf[g];
      const mm=Math.floor(result.timeSpent/60),ss=String(result.timeSpent%60).padStart(2,"0");
      const circ=2*Math.PI*42;
      return(
        <div style={{maxWidth:480,margin:"0 auto",padding:22,textAlign:"center"}}>
          {showReview&&quiz&&<AnswerReview quiz={quiz} userAnswers={result.answers||{}} onClose={()=>setShowReview(false)}/>}
          {showProctor&&proctoringReport&&<ProctoringReport report={proctoringReport} quizTitle={quiz?.title||""} onClose={()=>setShowProctor(false)}/>}
          <Cd style={{padding:38,animation:"popIn .45s cubic-bezier(.34,1.56,.64,1) both"}}>
            <div style={{fontSize:58,marginBottom:7,animation:"pulse 2s ease-in-out infinite"}}>{c.e}</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:900,color:c.c}}>{c.l}</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:58,fontWeight:900,color:c.c,margin:"10px 0"}}>{result.score}%</div>
            <div style={{position:"relative",width:100,height:100,margin:"0 auto 20px"}}>
              <svg width="100" height="100" style={{transform:"rotate(-90deg)"}}>
                <circle cx="50" cy="50" r="42" fill="none" stroke="var(--border)" strokeWidth="7"/>
                <circle cx="50" cy="50" r="42" fill="none" stroke={c.c} strokeWidth="7" strokeDasharray={circ} strokeDashoffset={circ*(1-result.score/100)} strokeLinecap="round" style={{transition:"stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)"}}/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:900,color:c.c}}>{result.correct}/{result.total}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
              {[["✅","Верно",`${result.correct}`,"var(--green)"],["📝","Итого",`${result.total}`,"var(--accent)"],["⏱","Время",`${mm}:${ss}`,"var(--blue)"]].map(([ic,l,v,col])=>(
                <div key={l} style={{background:"var(--bg2)",borderRadius:10,padding:"12px 8px",border:"1px solid var(--border)"}}>
                  <div style={{fontSize:10.5,color:"var(--text3)",marginBottom:3}}>{ic} {l}</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:900,color:col}}>{v}</div>
                </div>
              ))}
            </div>
            {quiz&&<button onClick={()=>setShowReview(true)} style={{width:"100%",marginBottom:9,background:"var(--bg2)",border:"1.5px solid var(--border2)",borderRadius:10,padding:"10px",fontSize:13.5,fontWeight:700,color:"var(--text2)",cursor:"pointer",transition:"all .17s"}} onMouseEnter={e=>e.currentTarget.style.background="var(--accent-bg)"} onMouseLeave={e=>e.currentTarget.style.background="var(--bg2)"}>🔍 Разбор ошибок</button>}
            {proctoringReport&&(
              <button onClick={()=>setShowProctor(true)} style={{width:"100%",marginBottom:9,background:"var(--red-bg)",border:"1.5px solid rgba(143,53,53,.25)",borderRadius:10,padding:"10px",fontSize:13.5,fontWeight:700,color:"var(--red)",cursor:"pointer"}}>
                🛡️ Отчёт прокторинга · {proctoringReport.suspicionScore}% подозрений
              </button>
            )}
            <div style={{display:"flex",gap:9}}>
              <Bt onClick={onRestart} outline style={{flex:1}}>🔄 Ещё раз</Bt>
              <Bt onClick={onExit} style={{flex:1}}>← В каталог</Bt>
            </div>
          </Cd>
        </div>
      );
    }

    // ── QUIZ EDITOR ───────────────────────────────────────────────
    function QuizEditor({quiz:eq,onSave,onCancel,userId}){
      const[title,setTitle]=useState(eq?.title||"");
      const[cat,setCat]=useState(eq?.category||"Java");
      const[diff,setDiff]=useState(eq?.difficulty||"MEDIUM");
      const[timer,setTimer]=useState(eq?.timerMinutes||20);
      const[pass,setPass]=useState(eq?.passingScore||60);
      const[cc,setCc]=useState(eq?.coverColor||"#8b6914");
      const[emoji,setEmoji]=useState(eq?.emoji||"💻");
      const[qs,setQs]=useState(eq?.questions||[]);
      const[status,setStatus]=useState(eq?.status||"ACTIVE");
      const[proctoring,setProctoring]=useState(eq?.proctoring||{});
      const[saving,setSaving]=useState(false);
      const[publishing,setPublishing]=useState(false);
      const[published,setPublished]=useState(eq?.publishedToCatalog||false);
      const[err,setErr]=useState("");
      const[showBank,setShowBank]=useState(false);
      const[showAI,setShowAI]=useState(false);
      const[privateCode,setPrivateCode]=useState(eq?.accessCode||null);
      const[showCodeModal,setShowCodeModal]=useState(false);
      const EMOJIS=["💻","🐍","🟨","⚛️","🗄️","🌿","🐳","🌐","⚡","🔐","🎯","📊","🧠","🔧","☁️","☕","⚙️","🔷","🔵","🟣","🐹","🐘","🌐"];
      const COLORS=["#8b6914","#3d7a52","#2e588a","#6a4a90","#8f3535","#3a6020","#184e7a","#6a3220","#1a6a50","#6b3a7a","#3178c6","#512bd4","#7f52ff","#00add8","#4f5b93"];
      const CATS2=Object.keys(CAT_EMOJIS);
      const IS={background:"var(--bg2)",border:"1.5px solid var(--border)",borderRadius:10,padding:"10px 13px",fontSize:13.5,color:"var(--text)",width:"100%",fontFamily:"'DM Sans',sans-serif",outline:"none"};
      const SS={...IS,cursor:"pointer"};
      function addQ(){setQs(q=>[...q,{id:Date.now().toString(),text:"",type:"SINGLE_CHOICE",points:1,options:["","","",""],correctAnswerIndices:[0]}]);}
      function rmQ(id){setQs(q=>q.filter(x=>x.id!==id));}
      function upQ(id,f,v){setQs(q=>q.map(x=>x.id===id?{...x,[f]:v}:x));}
      async function save(pub=false){
        if(!title.trim()){setErr("Введите название");return;}
        if(qs.length===0){setErr("Добавьте хотя бы один вопрос");return;}
        setErr("");
        if(pub) setPublishing(true); else setSaving(true);
        try{
          const willPublish=pub?true:published;
          const newId=eq?.id||("my_"+Date.now().toString());
          const body={id:newId,title,category:cat,difficulty:diff,timerMinutes:+timer,passingScore:+pass,coverColor:cc,emoji,status:pub?"ACTIVE":status,questions:qs,tags:[cat.toLowerCase()],publishedToCatalog:willPublish,proctoring,creatorId:userId,accessCode:privateCode||undefined};
          // Try API first, fallback to localStorage
          let saved=false;
          try{
            let d;
            if(eq?.id) d=await api("PUT",`/api/quizzes/${eq.id}`,body);
            else d=await api("POST","/api/quizzes",body);
            saved=true;
          }catch{}
          // Always save to localStorage
          saveMyLocalTest(body,userId);
          if(pub) setPublished(true);
          onSave(body);
        }catch(e){setErr(e.message);}
        setSaving(false);setPublishing(false);
      }
      async function savePrivate(){
        if(!title.trim()){setErr("Введите название");return;}
        if(qs.length===0){setErr("Добавьте хотя бы один вопрос");return;}
        setErr("");setSaving(true);
        try{
          const newId=eq?.id||("my_"+Date.now().toString());
          const code=privateCode||generateAccessCode();
          const body={id:newId,title,category:cat,difficulty:diff,timerMinutes:+timer,passingScore:+pass,coverColor:cc,emoji,status:"PRIVATE",questions:qs,tags:[cat.toLowerCase()],publishedToCatalog:false,proctoring,creatorId:userId,accessCode:code,isPrivate:true};
          try{let d;if(eq?.id)d=await api("PUT",`/api/quizzes/${eq.id}`,body);else d=await api("POST","/api/quizzes",body);}catch{}
          saveMyLocalTest(body,userId);
          savePrivateTest(body);
          setPrivateCode(code);
          setShowCodeModal(true);
          onSave(body);
        }catch(e){setErr(e.message);}
        setSaving(false);
      }
      function applyAI(data){
        setTitle(data.title||title);if(data.category)setCat(data.category);if(data.difficulty)setDiff(data.difficulty);
        if(data.timerMinutes)setTimer(data.timerMinutes);if(data.passingScore)setPass(data.passingScore);
        if(data.emoji)setEmoji(data.emoji);if(data.coverColor)setCc(data.coverColor);
        setQs(data.questions||[]);setShowAI(false);
      }
      return(
        <div style={{maxWidth:700,margin:"0 auto",padding:22}}>
          {showBank&&<QuestionBankModal onClose={()=>setShowBank(false)} onAddQuestions={newQs=>setQs(q=>[...q,...newQs])} currentQuestions={qs}/>}
          {showAI&&<AIQuizGenerator onClose={()=>setShowAI(false)} onApply={applyAI}/>}
          {showCodeModal&&privateCode&&<PrivateCodeModal code={privateCode} testTitle={title} onClose={()=>setShowCodeModal(false)}/>}
          <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:22,flexWrap:"wrap"}}>
            <Bt onClick={onCancel} outline sz="sm" col="var(--text3)">← Назад</Bt>
            <h2 style={{flex:1,fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:900,color:"var(--text)"}}>{eq?"Редактировать тест":"Создать тест"}</h2>
            <Bt onClick={()=>setShowAI(true)} col="var(--blue)" sz="sm">🤖 ИИ</Bt>
            <Bt onClick={()=>setShowBank(true)} outline sz="sm">📚 Банк</Bt>
            <Bt onClick={()=>save(false)} disabled={saving||publishing} col="var(--green)">{saving?"Сохранение...":"💾 Сохранить"}</Bt>
            <Bt onClick={savePrivate} disabled={saving||publishing} col="var(--text)" style={{background:"var(--bg3)",color:"var(--text)",border:"1.5px solid var(--border2)"}}>{privateCode?"🔒 Приватный ("+privateCode+")":"🔒 Приватный"}</Bt>
            <Bt onClick={()=>save(true)} disabled={saving||publishing} col={published?"var(--blue)":"var(--accent)"}>{publishing?"Публикация...":(published?"🌐 Опубликовано":"🌐 Опубликовать")}</Bt>
          </div>
          {err&&<div style={{background:"var(--red-bg)",border:"1px solid rgba(143,53,53,.22)",borderRadius:9,padding:"9px 13px",color:"var(--red)",fontSize:13,marginBottom:14}}>{err}</div>}
          <Cd style={{padding:20,marginBottom:12}}>
            <div style={{fontWeight:700,color:"var(--text3)",fontSize:10.5,textTransform:"uppercase",letterSpacing:1.3,marginBottom:13}}>Основное</div>
            <div style={{display:"grid",gap:11}}>
              <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Название теста" style={IS}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                <select value={cat} onChange={e=>setCat(e.target.value)} style={SS}>{CATS2.map(c=><option key={c}>{c}</option>)}</select>
                <select value={diff} onChange={e=>setDiff(e.target.value)} style={SS}>{Object.entries(DIFF).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9}}>
                <div><div style={{fontSize:11,color:"var(--text3)",fontWeight:600,marginBottom:4}}>Время (мин)</div><input type="number" value={timer} onChange={e=>setTimer(e.target.value)} min={5} max={120} style={IS}/></div>
                <div><div style={{fontSize:11,color:"var(--text3)",fontWeight:600,marginBottom:4}}>Проходной %</div><input type="number" value={pass} onChange={e=>setPass(e.target.value)} min={0} max={100} style={IS}/></div>
                <div><div style={{fontSize:11,color:"var(--text3)",fontWeight:600,marginBottom:4}}>Статус</div><select value={status} onChange={e=>setStatus(e.target.value)} style={SS}><option value="ACTIVE">Активен</option><option value="DRAFT">Черновик</option><option value="PRIVATE">Приватный</option></select></div>
              </div>
            </div>
            <div style={{marginTop:14}}>
              <div style={{fontSize:11,color:"var(--text3)",fontWeight:600,marginBottom:6}}>Иконка</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>{EMOJIS.map(e=><button key={e} onClick={()=>setEmoji(e)} style={{background:emoji===e?"var(--accent-bg)":"var(--bg2)",border:`2px solid ${emoji===e?"var(--accent)":"var(--border)"}`,borderRadius:8,padding:"6px 8px",fontSize:16,cursor:"pointer",transition:"all .15s"}}>{e}</button>)}</div>
              <div style={{fontSize:11,color:"var(--text3)",fontWeight:600,marginBottom:6}}>Цвет обложки</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{COLORS.map(c=><button key={c} onClick={()=>setCc(c)} style={{width:28,height:28,borderRadius:7,background:c,border:`3px solid ${cc===c?"var(--text)":"transparent"}`,cursor:"pointer",transition:"border-color .15s"}}/>)}</div>
            </div>
          </Cd>
          <div style={{marginBottom:12}}>
            <ProctoringSettings value={proctoring} onChange={setProctoring}/>
          </div>
          <Cd style={{padding:20,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13}}>
              <div style={{fontWeight:700,color:"var(--text3)",fontSize:10.5,textTransform:"uppercase",letterSpacing:1.3}}>Вопросы ({qs.length})</div>
              <Bt onClick={addQ} sz="sm" col="var(--green)">+ Добавить</Bt>
            </div>
            {qs.map((q,qi)=>(
              <div key={q.id} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:11,padding:14,marginBottom:9}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                  <span style={{color:"var(--accent)",fontWeight:700,fontSize:11,letterSpacing:.4}}>ВОПРОС {qi+1}</span>
                  <button onClick={()=>rmQ(q.id)} style={{background:"var(--red-bg)",border:"none",borderRadius:7,padding:"3px 9px",color:"var(--red)",cursor:"pointer",fontSize:12,fontWeight:700}}>✕</button>
                </div>
                <textarea value={q.text} onChange={e=>upQ(q.id,"text",e.target.value)} placeholder="Текст вопроса..." rows={2} style={{width:"100%",background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 11px",fontSize:13.5,color:"var(--text)",resize:"vertical",marginBottom:8,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <select value={q.type} onChange={e=>upQ(q.id,"type",e.target.value)} style={{...SS,flex:1,fontSize:13}}>
                    <option value="SINGLE_CHOICE">Один вариант</option>
                    <option value="MULTIPLE_CHOICE">Несколько</option>
                    <option value="TRUE_FALSE">Верно/Неверно</option>
                    <option value="OPEN_TEXT">Открытый ответ</option>
                  </select>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:12,color:"var(--text3)",fontWeight:600}}>Баллы:</span>
                    <input type="number" value={q.points} onChange={e=>upQ(q.id,"points",+e.target.value)} min={1} max={10} style={{width:55,background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:"7px",color:"var(--text)",fontSize:13,textAlign:"center",outline:"none"}}/>
                  </div>
                </div>
                {(q.type==="SINGLE_CHOICE"||q.type==="MULTIPLE_CHOICE")&&(q.options||[]).map((opt,oi)=>(
                  <div key={oi} style={{display:"flex",gap:7,marginBottom:4,alignItems:"center"}}>
                    <input type={q.type==="MULTIPLE_CHOICE"?"checkbox":"radio"} checked={q.type==="MULTIPLE_CHOICE"?(q.correctAnswerIndices||[]).includes(oi):q.correctAnswerIndices?.[0]===oi}
                      onChange={()=>{if(q.type==="MULTIPLE_CHOICE"){const c=q.correctAnswerIndices||[];upQ(q.id,"correctAnswerIndices",c.includes(oi)?c.filter(i=>i!==oi):[...c,oi]);}else upQ(q.id,"correctAnswerIndices",[oi]);}} style={{accentColor:"var(--accent)",width:14,height:14}}/>
                    <input value={opt} onChange={e=>upQ(q.id,"options",(q.options||[]).map((o,i)=>i===oi?e.target.value:o))} placeholder={`Вариант ${oi+1}`} style={{flex:1,background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,padding:"6px 10px",fontSize:13,color:"var(--text)",fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                  </div>
                ))}
                {q.type==="TRUE_FALSE"&&<div style={{display:"flex",gap:12}}>{["Верно","Неверно"].map((opt,oi)=><label key={oi} style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",color:"var(--text2)",fontSize:13.5}}><input type="radio" name={`tf_${q.id}`} checked={q.correctAnswerIndices?.[0]===oi} onChange={()=>upQ(q.id,"correctAnswerIndices",[oi])} style={{accentColor:"var(--accent)"}}/>{opt}</label>)}</div>}
                {q.type==="OPEN_TEXT"&&<input value={q.correctTextAnswer||""} onChange={e=>upQ(q.id,"correctTextAnswer",e.target.value)} placeholder="Правильный ответ" style={{width:"100%",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,padding:"7px 10px",fontSize:13,color:"var(--text)",fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>}
              </div>
            ))}
            {qs.length===0&&<div style={{textAlign:"center",padding:28,color:"var(--text3)",fontSize:13.5}}>Нажмите «+ Добавить», «📚 Банк» или «🤖 ИИ» для создания вопросов</div>}
          </Cd>
        </div>
      );
    }

    // ── PROFILE PAGE ──────────────────────────────────────────────
    // ── AVATAR PICKER MODAL ───────────────────────────────────────
    const AVATAR_GALLERY=[
      // Милые животные
      {g:"🐾 Животные",items:["🐱","🐶","🐰","🐻","🐼","🐨","🦊","🐯","🦁","🐸","🐧","🦋","🦄","🐺","🐮","🐷","🦔","🐭","🐹","🦝"]},
      // Фрукты и еда
      {g:"🍓 Еда",items:["🍓","🍑","🍒","🍇","🍊","🍋","🥝","🍰","🧁","🍩","🧋","☕","🍵","🍪","🍫","🍭","🌸","🎂","🍦","🧃"]},
      // Природа
      {g:"🌿 Природа",items:["🌸","🌺","🌻","🌹","🌷","🍀","🌿","🍁","🌊","⭐","🌙","☀️","🌈","❄️","🔥","💧","🌴","🍄","🌵","🦋"]},
      // Магия и фэнтези
      {g:"✨ Магия",items:["✨","🔮","🪄","💫","🌟","⚡","🎭","🎪","🎨","🎸","🎵","🎮","🕹️","🎯","🎲","🃏","🧿","💎","🪩","🦄"]},
      // Еmoji лица
      {g:"😊 Эмоции",items:["😊","🥰","😎","🤩","😇","🥳","😺","🙈","🤠","👻","🐙","🦖","🦕","🌚","🌝","👾","🤖","🐉","🦩","🎃"]},
    ];

    function AvatarPickerModal({user,onSave,onClose}){
      const[tab,setTab]=useState("gallery");
      const[selected,setSelected]=useState(user?.avatarEmoji||"☕");
      const[photoPreview,setPhotoPreview]=useState(user?.avatarPhoto||null);
      const[activeGroup,setActiveGroup]=useState(0);
      const fileRef=useRef();

      function handleFile(e){
        const file=e.target.files?.[0];
        if(!file) return;
        if(file.size>2*1024*1024){alert("Файл слишком большой. Максимум 2 МБ.");return;}
        const reader=new FileReader();
        reader.onload=ev=>{setPhotoPreview(ev.target.result);setTab("upload");};
        reader.readAsDataURL(file);
      }

      function save(){
        if(tab==="upload"&&photoPreview){
          onSave({avatarPhoto:photoPreview,avatarEmoji:null});
        } else {
          onSave({avatarEmoji:selected,avatarPhoto:null});
        }
        onClose();
      }

      const previewUser=tab==="upload"&&photoPreview
        ?{...user,avatarPhoto:photoPreview,avatarEmoji:null}
        :{...user,avatarEmoji:selected,avatarPhoto:null};

      return(
        <div style={{position:"fixed",inset:0,zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",backdropFilter:"blur(8px)"}}/>
          <div className="pi" style={{position:"relative",background:"var(--card)",borderRadius:24,padding:"28px 24px",width:"min(94vw,520px)",boxShadow:"0 32px 100px rgba(0,0,0,.35)",maxHeight:"85vh",overflow:"hidden",display:"flex",flexDirection:"column"}}>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,fontWeight:900,color:"var(--text)"}}>🎨 Выбор аватарки</div>
              <button onClick={onClose} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:16,color:"var(--text3)"}}>✕</button>
            </div>

            {/* Preview */}
            <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
              <div style={{position:"relative"}}>
                <Av user={previewUser} size={82}/>
                <div style={{position:"absolute",bottom:-2,right:-2,background:"var(--accent)",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",border:"2px solid var(--card)"}}>✏️</div>
              </div>
            </div>

            {/* Tabs */}
            <div style={{display:"flex",gap:8,marginBottom:18}}>
              {[["gallery","🖼️ Галерея"],["upload","📷 Свое фото"]].map(([t,l])=>(
                <button key={t} onClick={()=>setTab(t)}
                  style={{flex:1,padding:"9px",borderRadius:10,border:`2px solid ${tab===t?"var(--accent)":"var(--border)"}`,background:tab===t?"var(--accent-bg)":"transparent",color:tab===t?"var(--accent)":"var(--text3)",fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .18s"}}>
                  {l}
                </button>
              ))}
            </div>

            {/* Gallery Tab */}
            {tab==="gallery"&&(
              <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
                {/* Group tabs */}
                <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4,flexShrink:0}}>
                  {AVATAR_GALLERY.map((g,i)=>(
                    <button key={i} onClick={()=>setActiveGroup(i)}
                      style={{whiteSpace:"nowrap",padding:"5px 12px",borderRadius:99,border:`1.5px solid ${activeGroup===i?"var(--accent)":"var(--border)"}`,background:activeGroup===i?"var(--accent-bg)":"var(--bg2)",color:activeGroup===i?"var(--accent)":"var(--text3)",fontWeight:600,fontSize:11.5,cursor:"pointer",transition:"all .15s",flexShrink:0}}>
                      {g.g}
                    </button>
                  ))}
                </div>
                {/* Emoji grid */}
                <div style={{overflowY:"auto",flex:1}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
                    {AVATAR_GALLERY[activeGroup].items.map(em=>(
                      <button key={em} onClick={()=>{setSelected(em);setTab("gallery");}}
                        style={{aspectRatio:"1",borderRadius:14,border:`2.5px solid ${selected===em&&tab==="gallery"?"var(--accent)":"var(--border)"}`,background:selected===em&&tab==="gallery"?"var(--accent-bg)":"var(--bg2)",fontSize:28,cursor:"pointer",transition:"all .15s",display:"flex",alignItems:"center",justifyContent:"center",transform:selected===em&&tab==="gallery"?"scale(1.12)":"scale(1)"}}>
                        {em}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* Upload Tab */}
            {tab==="upload"&&(
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
                <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
                {photoPreview?(
                  <div style={{textAlign:"center"}}>
                    <div style={{width:110,height:110,borderRadius:"50%",overflow:"hidden",border:"3px solid var(--accent)",margin:"0 auto 14px",boxShadow:"var(--shadow2)"}}>

    // ── ANALYTICS PAGE ────────────────────────────────────────────
    // ── ANALYTICS: RADAR CHART ────────────────────────────────────
    function RadarChart({data,size=200}){
      if(!data||data.length===0) return null;
      const cx=size/2,cy=size/2,r=(size/2)-28;
      const n=data.length;
      const pts=data.map((d,i)=>{
        const angle=(2*Math.PI*i/n)-Math.PI/2;
        const val=Math.max(0,Math.min(100,d.value))/100;
        return{x:cx+r*val*Math.cos(angle),y:cy+r*val*Math.sin(angle),lx:cx+(r+18)*Math.cos(angle),ly:cy+(r+18)*Math.sin(angle),label:d.label,value:d.value};
      });
      const poly=pts.map(p=>`${p.x},${p.y}`).join(" ");
      const rings=[0.25,0.5,0.75,1];
      return(
        <svg width={size} height={size} style={{overflow:"visible"}}>
          {rings.map((rv,ri)=>{
            const rpts=Array.from({length:n},(_,i)=>{const a=(2*Math.PI*i/n)-Math.PI/2;return`${cx+r*rv*Math.cos(a)},${cy+r*rv*Math.sin(a)}`;});
            return <polygon key={ri} points={rpts.join(" ")} fill="none" stroke="var(--border)" strokeWidth="1" opacity={0.7}/>;
          })}
          {pts.map((p,i)=><line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos((2*Math.PI*i/n)-Math.PI/2)} y2={cy+r*Math.sin((2*Math.PI*i/n)-Math.PI/2)} stroke="var(--border)" strokeWidth="1"/>)}
          <polygon points={poly} fill="var(--accent)" fillOpacity="0.18" stroke="var(--accent)" strokeWidth="2" strokeLinejoin="round"/>
          {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4" fill="var(--accent)" stroke="var(--card)" strokeWidth="2"/>)}
          {pts.map((p,i)=>{
            const anchor=p.lx<cx-5?"end":p.lx>cx+5?"start":"middle";
            return(<g key={i}>
              <text x={p.lx} y={p.ly-3} textAnchor={anchor} fontSize="9" fill="var(--text3)" fontWeight="700" fontFamily="DM Sans,sans-serif">{p.label}</text>
              <text x={p.lx} y={p.ly+9} textAnchor={anchor} fontSize="9" fill="var(--accent)" fontWeight="900" fontFamily="DM Sans,sans-serif">{p.value}%</text>
            </g>);
          })}
        </svg>
      );
    }

    // ── ANALYTICS: HEATMAP (35 days) ──────────────────────────────
    function ActivityHeatmap({history}){
      const today=new Date();
      const cells=Array.from({length:35},(_,i)=>{
        const d=new Date(today);d.setDate(d.getDate()-(34-i));
        const dateStr=d.toDateString();
        const dayH=history.filter(a=>new Date(a.date).toDateString()===dateStr);
        return{date:d,count:dayH.length,avg:dayH.length?Math.round(dayH.reduce((s,a)=>s+a.score,0)/dayH.length):0,isToday:dateStr===today.toDateString()};
      });
      const maxC=Math.max(...cells.map(c=>c.count),1);
      function getColor(c){
        if(c.count===0) return"var(--border)";
        const intensity=c.count/maxC;
        if(intensity>0.75) return"var(--accent)";
        if(intensity>0.4) return"var(--accent2)";
        return"var(--accent-mid)";
      }
      return(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(35,1fr)",gap:3}}>
            {cells.map((c,i)=>(
              <div key={i} title={`${c.date.toLocaleDateString("ru-RU")}: ${c.count} тест(ов)${c.count>0?`, ср. ${c.avg}%`:""}`}
                style={{aspectRatio:"1",borderRadius:3,background:getColor(c),border:c.isToday?"2px solid var(--accent)":"none",cursor:c.count>0?"pointer":"default",transition:"transform .15s"}}
                onMouseEnter={e=>{if(c.count>0)e.currentTarget.style.transform="scale(1.4)";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";}}
              />
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,justifyContent:"flex-end"}}>
            <span style={{fontSize:10,color:"var(--text3)"}}>Меньше</span>
            {["var(--border)","var(--accent-mid)","var(--accent2)","var(--accent)"].map((bg,i)=><div key={i} style={{width:10,height:10,borderRadius:2,background:bg}}/>)}
            <span style={{fontSize:10,color:"var(--text3)"}}>Больше</span>
          </div>
        </div>
      );
    }

    // ── ANALYTICS: SCORE TREND ────────────────────────────────────
    function ScoreTrendChart({history}){
      const recent=[...history].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-15);
      if(recent.length<2) return <div style={{textAlign:"center",padding:"24px 0",color:"var(--text3)",fontSize:13}}>Недостаточно данных (нужно минимум 2 попытки)</div>;
      const W=360,H=100,padL=28,padR=8,padT=12,padB=24;
      const minS=Math.min(...recent.map(r=>r.score));
      const maxS=Math.max(...recent.map(r=>r.score));
      const rangeS=Math.max(maxS-minS,20);
      function xp(i){return padL+(i/(recent.length-1))*(W-padL-padR);}
      function yp(s){return padT+((maxS-s)/rangeS)*(H-padT-padB);}
      const linePts=recent.map((r,i)=>`${xp(i)},${yp(r.score)}`).join(" ");
      const areaClose=`${xp(recent.length-1)},${H-padB} ${xp(0)},${H-padB}`;
      function movAvg(arr,w=3){return arr.map((_,i)=>{const sl=arr.slice(Math.max(0,i-w+1),i+1);return Math.round(sl.reduce((s,v)=>s+v,0)/sl.length);});}
      const ma=movAvg(recent.map(r=>r.score));
      const maLine=recent.map((r,i)=>`${xp(i)},${yp(ma[i])}`).join(" ");
      return(
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
          <defs><linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--accent)" stopOpacity="0.3"/><stop offset="100%" stopColor="var(--accent)" stopOpacity="0.02"/></linearGradient></defs>
          {minS<=60&&maxS>=60&&<line x1={padL} y1={yp(60)} x2={W-padR} y2={yp(60)} stroke="var(--red)" strokeWidth="1" strokeDasharray="4,3" opacity="0.5"/>}
          {minS<=60&&maxS>=60&&<text x={padL+2} y={yp(60)-3} fontSize="8" fill="var(--red)" opacity="0.7">60%</text>}
          <polygon points={`${linePts} ${areaClose}`} fill="url(#trendGrad)"/>
          <polyline points={linePts} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
          <polyline points={maLine} fill="none" stroke="var(--blue)" strokeWidth="1.5" strokeDasharray="5,3" strokeLinejoin="round" opacity="0.7"/>
          {recent.map((r,i)=>(
            <g key={i}><circle cx={xp(i)} cy={yp(r.score)} r="4" fill={r.passed?"var(--green)":"var(--red)"} stroke="var(--card)" strokeWidth="2"/><title>{new Date(r.date).toLocaleDateString("ru-RU")}: {r.score}%</title></g>
          ))}
          {[minS,Math.round((minS+maxS)/2),maxS].map((v,i)=>(
            <text key={i} x={padL-3} y={yp(v)+3} textAnchor="end" fontSize="8.5" fill="var(--text3)" fontFamily="DM Sans,sans-serif">{v}%</text>
          ))}
          {recent.map((r,i)=>(
            (i===0||i===recent.length-1||i===Math.floor(recent.length/2))&&
            <text key={i} x={xp(i)} y={H-padB+12} textAnchor="middle" fontSize="8" fill="var(--text3)" fontFamily="DM Sans,sans-serif">{new Date(r.date).toLocaleDateString("ru-RU",{day:"2-digit",month:"2-digit"})}</text>
          ))}
          <g><circle cx={W-80} cy={H-14} r="3" fill="var(--accent)"/><text x={W-74} y={H-11} fontSize="8" fill="var(--text3)">Результат</text></g>
          <line x1={W-44} y1={H-14} x2={W-30} y2={H-14} stroke="var(--blue)" strokeWidth="1.5" strokeDasharray="4,2"/><text x={W-26} y={H-11} fontSize="8" fill="var(--text3)">Тренд</text>
        </svg>
      );
    }

    // ── ANALYTICS: TIME DISTRIBUTION ─────────────────────────────
    function TimeDistribution({history}){
      if(history.length===0) return null;
      const buckets=[{label:"< 5 мин",min:0,max:300},{label:"5–10 мин",min:300,max:600},{label:"10–20 мин",min:600,max:1200},{label:"> 20 мин",min:1200,max:Infinity}];
      const counts=buckets.map(b=>history.filter(a=>{const ts=a.timeSpent||0;return ts>=b.min&&ts<b.max;}).length);
      const maxC=Math.max(...counts,1);
      const avgTime=Math.round(history.reduce((s,a)=>s+(a.timeSpent||0),0)/history.length);
      return(
        <div>
          <div style={{display:"flex",gap:8,alignItems:"flex-end",height:80,marginBottom:10}}>
            {buckets.map((b,i)=>(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{fontSize:10,color:"var(--text3)",fontWeight:700}}>{counts[i]}</div>
                <div style={{width:"100%",height:`${Math.max(8,counts[i]/maxC*68)}px`,background:"linear-gradient(180deg,var(--blue),#1a3a6a)",borderRadius:"4px 4px 2px 2px",opacity:counts[i]===0?0.2:1}}/>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            {buckets.map((b,i)=><div key={i} style={{flex:1,fontSize:9.5,color:"var(--text3)",textAlign:"center",fontWeight:600}}>{b.label}</div>)}
          </div>
          <div style={{marginTop:10,padding:"8px 12px",background:"var(--bg2)",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11.5,color:"var(--text3)"}}>⏱ Среднее время</span>
            <span style={{fontSize:13,fontWeight:800,color:"var(--blue)"}}>{Math.floor(avgTime/60)}:{String(avgTime%60).padStart(2,"0")}</span>
          </div>
        </div>
      );
    }

    // ── ANALYTICS: WEAK TOPICS ────────────────────────────────────
    function WeakTopicsBlock({history,quizzes}){
      const cats=[...new Set(quizzes.map(q=>q.category))];
      const catStats=cats.map(cat=>{
        const catA=history.filter(a=>{const q=quizzes.find(q=>q.id===a.quizId);return q&&q.category===cat;});
        if(!catA.length) return null;
        const avg=Math.round(catA.reduce((s,a)=>s+a.score,0)/catA.length);
        const passR=Math.round(catA.filter(a=>a.passed).length/catA.length*100);
        const trend=catA.length>=2?catA[catA.length-1].score-catA[0].score:0;
        return{cat,avg,passR,attempts:catA.length,trend};
      }).filter(Boolean);
      const weak=catStats.filter(c=>c.avg<70).sort((a,b)=>a.avg-b.avg).slice(0,5);
      if(weak.length===0) return(<div style={{textAlign:"center",padding:"20px 0",color:"var(--green)",fontSize:13,fontWeight:600}}>✅ Нет явных слабых мест! Все категории выше 70%</div>);
      return(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {weak.map(({cat,avg,passR,attempts,trend})=>(
            <div key={cat} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:"11px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7}}>
                <div><span style={{fontWeight:700,color:"var(--text)",fontSize:13}}>{cat}</span><span style={{marginLeft:8,fontSize:10.5,color:"var(--text3)"}}>{attempts} попыток</span></div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  {trend!==0&&<span style={{fontSize:11,fontWeight:700,color:trend>0?"var(--green)":"var(--red)"}}>{trend>0?`↑+${trend}%`:`↓${trend}%`}</span>}
                  <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:900,color:avg<50?"var(--red)":"var(--accent)"}}>{avg}%</span>
                </div>
              </div>
              <div style={{background:"var(--border)",borderRadius:99,height:5,marginBottom:5}}><div style={{width:`${avg}%`,height:"100%",background:avg<50?"var(--red)":"linear-gradient(90deg,var(--accent),var(--accent2))",borderRadius:99}}/></div>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:10.5,color:"var(--text3)"}}>Сдача: <span style={{fontWeight:700,color:passR>=60?"var(--accent)":"var(--red)"}}>{passR}%</span></span>
                <span style={{fontSize:10.5,color:"var(--red)",fontWeight:600}}>{avg<50?"🔴 Требует внимания":avg<60?"🟠 Слабо":"🟡 Ниже нормы"}</span>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ── ANALYTICS: INSIGHTS ───────────────────────────────────────
    function PerformanceInsights({history,quizzes}){
      const insights=[];
      if(!history.length) return null;
      const avgScore=Math.round(history.reduce((s,a)=>s+a.score,0)/history.length);
      const passRate=Math.round(history.filter(a=>a.passed).length/history.length*100);
      const last5=history.slice(-5);
      const last5avg=last5.length?Math.round(last5.reduce((s,a)=>s+a.score,0)/last5.length):0;
      const prevAvg=history.length>5?Math.round(history.slice(-10,-5).reduce((s,a)=>s+a.score,0)/Math.min(5,history.length-5)):null;
      if(last5avg>avgScore+5) insights.push({icon:"🚀",color:"var(--green)",title:"Прогресс ускоряется",text:`Последние 5 попыток в среднем ${last5avg}% — выше общего на ${last5avg-avgScore}%`});
      else if(prevAvg!==null&&last5avg<prevAvg-5) insights.push({icon:"⚠️",color:"var(--accent)",title:"Снижение результатов",text:`Последние попытки ниже предыдущих на ${prevAvg-last5avg}%. Рекомендуем повторение.`});
      if(passRate>=80) insights.push({icon:"🏆",color:"var(--green)",title:"Высокий процент сдачи",text:`Вы сдаёте ${passRate}% тестов — отличный результат!`});
      else if(passRate<50) insights.push({icon:"📚",color:"var(--red)",title:"Низкий процент сдачи",text:`Только ${passRate}% тестов сдано. Сосредоточьтесь на слабых темах.`});
      const hardAttempts=history.filter(a=>{const q=quizzes.find(q=>q.id===a.quizId);return q&&q.difficulty==="HARD";});
      if(hardAttempts.length>=3){const ha=Math.round(hardAttempts.reduce((s,a)=>s+a.score,0)/hardAttempts.length);if(ha>=70) insights.push({icon:"💪",color:"var(--blue)",title:"Сильный студент",text:`Средний балл на сложных тестах: ${ha}%`});}
      const times=history.map(a=>a.timeSpent||0).filter(t=>t>0);
      const avgT=times.length?Math.round(times.reduce((s,v)=>s+v,0)/times.length):0;
      if(avgT>0&&avgT<300) insights.push({icon:"⚡",color:"var(--accent)",title:"Быстрые ответы",text:`Среднее время сессии: ${Math.floor(avgT/60)} мин — не торопитесь с ответами?`});
      if(!insights.length) return <div style={{color:"var(--text3)",fontSize:13,textAlign:"center",padding:"16px 0"}}>Пройдите больше тестов для получения инсайтов</div>;
      return(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {insights.map((ins,i)=>(
            <div key={i} style={{display:"flex",gap:11,padding:"11px 14px",background:"var(--bg2)",border:`1px solid ${ins.color}33`,borderRadius:10,borderLeft:`3px solid ${ins.color}`}}>
              <span style={{fontSize:18,flexShrink:0,marginTop:1}}>{ins.icon}</span>
              <div><div style={{fontWeight:700,fontSize:12.5,color:ins.color,marginBottom:3}}>{ins.title}</div><div style={{fontSize:12,color:"var(--text2)",lineHeight:1.5}}>{ins.text}</div></div>
            </div>
          ))}
        </div>
      );
    }

                  <Cd key={l} style={{padding:"16px 12px",textAlign:"center"}}><div style={{fontSize:22,marginBottom:5}}>{ic}</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:900,color:col}}>{v}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:3}}>{l}</div>{sub&&<div style={{fontSize:10.5,color:col,marginTop:4,fontWeight:600,opacity:.75}}>{sub}</div>}</Cd>

                <div style={{fontWeight:700,fontSize:13.5,marginBottom:12,color:"var(--text)"}}>🗓 Тепловая карта (35 дней)</div>
                <ActivityHeatmap history={history}/>
              </Cd>
            </div>
          )}

          {activeTab==="progress"&&(
            <div>
              <Cd style={{padding:20,marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:13.5,marginBottom:4,color:"var(--text)"}}>📉 Динамика результатов</div>
                <div style={{fontSize:11.5,color:"var(--text3)",marginBottom:14}}>Синяя пунктирная линия — тренд. Зелёные точки — сдано, красные — не сдано.</div>
                <ScoreTrendChart history={history}/>
              </Cd>
              <Cd style={{padding:18,marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:13.5,marginBottom:14,color:"var(--text)"}}>⏱ Распределение времени</div>
                <TimeDistribution history={history}/>
              </Cd>
              <Cd style={{padding:18}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:14,color:"var(--text)"}}>📊 Статистика по сложности</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {Object.entries(DIFF).map(([k,v])=>{
                    const diffAttempts=history.filter(a=>{const q=quizzes.find(q=>q.id===a.quizId);return q&&q.difficulty===k;});
                    const diffAvg=diffAttempts.length?Math.round(diffAttempts.reduce((s,a)=>s+a.score,0)/diffAttempts.length):0;
                    const diffPass=diffAttempts.length?Math.round(diffAttempts.filter(a=>a.passed).length/diffAttempts.length*100):0;
                    return(
                      <div key={k} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:"13px 12px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><span style={{fontSize:16}}>{v.dot}</span><span style={{fontWeight:700,color:v.color,fontSize:13}}>{v.label}</span><span style={{marginLeft:"auto",fontSize:11,color:"var(--text3)"}}>{diffAttempts.length} попыток</span></div>
                        {diffAttempts.length>0?(<><div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text3)",marginBottom:4}}><span>Ср. балл</span><span style={{fontWeight:800,color:v.color}}>{diffAvg}%</span></div><div style={{background:"var(--border)",borderRadius:99,height:5,marginBottom:6}}><div style={{width:`${diffAvg}%`,height:"100%",background:v.color,borderRadius:99}}/></div><div style={{fontSize:11,color:"var(--text3)"}}>Сдача: <span style={{fontWeight:700,color:diffPass>=60?"var(--green)":"var(--red)"}}>{diffPass}%</span></div></>):<div style={{fontSize:11,color:"var(--text3)"}}>Нет данных</div>}
                      </div>
                    );
                  })}
                </div>
              </Cd>
            </div>
          )}

          {activeTab==="categories"&&(
            <div>
              {catProgress.length===0
                ?<Cd style={{padding:40,textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>📂</div><div style={{color:"var(--text3)",fontSize:15}}>Нет данных. Пройдите хотя бы один тест.</div></Cd>
                :<>
                  <Cd style={{padding:18,marginBottom:12}}>
                    <div style={{fontWeight:700,fontSize:13.5,marginBottom:14,color:"var(--text)"}}>🧠 Прогресс по категориям</div>
                    <div style={{display:"flex",flexDirection:"column",gap:9}}>
                      {catProgress.map(({cat,attempts,avg,best,passed})=>(
                        <div key={cat} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:11,padding:"12px 16px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                            <div><span style={{fontWeight:700,color:"var(--text)",fontSize:13.5}}>{cat}</span><span style={{marginLeft:9,fontSize:11,color:"var(--text3)"}}>{attempts} попыток · {passed} сдано</span></div>
                            <div style={{textAlign:"right"}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:900,color:avg>=75?"var(--green)":avg>=60?"var(--accent)":"var(--red)"}}>{avg}%</div><div style={{fontSize:10.5,color:"var(--text3)"}}>лучший: <span style={{fontWeight:700,color:"var(--green)"}}>{best}%</span></div></div>
                          </div>
                          <div style={{background:"var(--border)",borderRadius:99,height:7,marginBottom:4}}><div style={{width:`${avg}%`,height:"100%",background:avg>=75?"var(--green)":avg>=60?"linear-gradient(90deg,var(--accent),var(--accent2))":"var(--red)",borderRadius:99,transition:"width 1s ease"}}/></div>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <div style={{fontSize:10.5,color:"var(--text3)"}}>Сдача: <span style={{fontWeight:700,color:attempts?Math.round(passed/attempts*100)>=60?"var(--green)":"var(--red)":"var(--text3)"}}>{attempts?Math.round(passed/attempts*100):0}%</span></div>
                            <span style={{fontSize:10.5,fontWeight:700,padding:"2px 8px",borderRadius:99,background:avg>=75?"var(--green-bg)":avg>=60?"var(--accent-bg)":"var(--red-bg)",color:avg>=75?"var(--green)":avg>=60?"var(--accent)":"var(--red)"}}>{avg>=75?"✓ Хорошо":avg>=60?"~ Норма":"✗ Слабо"}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </Cd>
                  <Cd style={{padding:18}}>
                    <div style={{fontWeight:700,fontSize:13.5,marginBottom:14,color:"var(--text)"}}>⚠️ Слабые темы (требуют повторения)</div>
                    <WeakTopicsBlock history={history} quizzes={quizzes}/>
                  </Cd>
                </>
              }
            </div>
          )}

          {activeTab==="insights"&&(
            <div>
              <Cd style={{padding:18,marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:13.5,marginBottom:14,color:"var(--text)"}}>💡 Персональные инсайты</div>
                {history.length===0?<div style={{textAlign:"center",padding:"24px 0",color:"var(--text3)"}}>Пройдите хотя бы один тест для получения инсайтов</div>:<PerformanceInsights history={history} quizzes={quizzes}/>}
              </Cd>
              <Cd style={{padding:18,marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:13.5,marginBottom:14,color:"var(--text)"}}>📊 Сводная статистика</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                  {[["Всего попыток",history.length,"var(--accent)"],["Сдано тестов",history.filter(a=>a.passed).length,"var(--green)"],["Средний балл",`${avgScore}%`,"var(--blue)"],["Лучший балл",`${bestScore}%`,"var(--green)"],["Процент сдачи",`${passRate}%`,passRate>=70?"var(--green)":passRate>=50?"var(--accent)":"var(--red)"],["Серия дней",`${streak} дн.`,"var(--red)"],["Достижений",`${unlocked.length}/${ACHIEVEMENTS.length}`,"var(--accent)"],["Общее время",`${Math.floor(totalTime/60)} мин`,"var(--text2)"]].map(([label,val,col])=>(
                    <div key={label} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:9,padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:12,color:"var(--text3)"}}>{label}</span><span style={{fontSize:14,fontWeight:900,color:col}}>{val}</span>
                    </div>
                  ))}
                </div>
              </Cd>
              <Cd style={{padding:18}}>
                <div style={{fontWeight:700,fontSize:13.5,marginBottom:14,color:"var(--text)"}}>📋 Последние 10 попыток</div>
                {history.length===0?<div style={{textAlign:"center",color:"var(--text3)",padding:"20px 0"}}>Нет данных</div>:(
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {[...history].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,10).map((a,i)=>{
                      const quiz=quizzes.find(q=>q.id===a.quizId);
                      return(
                        <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 13px",background:"var(--bg2)",borderRadius:9,border:"1px solid var(--border)"}}>
                          <span style={{fontSize:15}}>{quiz?.emoji||"📝"}</span>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontWeight:600,color:"var(--text)",fontSize:12.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.quizTitle||quiz?.title||"Тест"}</div>
                            <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{new Date(a.date).toLocaleDateString("ru-RU")} · {Math.floor((a.timeSpent||0)/60)} мин</div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0}}>
                            <div style={{fontWeight:900,fontSize:15,color:a.passed?"var(--green)":a.score>=60?"var(--accent)":"var(--red)"}}>{a.score}%</div>
                            <div style={{fontSize:10,fontWeight:700,color:a.passed?"var(--green)":"var(--red)"}}>{a.passed?"✓":"✗"}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </Cd>
            </div>
          )}

          {activeTab==="achievements"&&(
            <Cd style={{padding:18}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontWeight:700,fontSize:13.5,color:"var(--text)"}}>🏅 Достижения</div>
                <span style={{fontSize:12,color:"var(--text3)",fontWeight:600}}>{unlocked.length} из {ACHIEVEMENTS.length}</span>
              </div>
              <div style={{background:"var(--border)",borderRadius:99,height:8,marginBottom:16}}><div style={{width:`${ACHIEVEMENTS.length?unlocked.length/ACHIEVEMENTS.length*100:0}%`,height:"100%",background:"linear-gradient(90deg,var(--green),var(--accent))",borderRadius:99,transition:"width 1s ease"}}/></div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
                {ACHIEVEMENTS.map(a=>{
                  const got=unlocked.includes(a.id);
                  return(
                    <div key={a.id} style={{background:got?"var(--accent-bg)":"var(--bg3)",border:`1.5px solid ${got?"var(--border2)":"var(--border)"}`,borderRadius:12,padding:"14px 10px",textAlign:"center",opacity:got?1:.45,transition:"all .25s"}}>
                      <div style={{fontSize:30,marginBottom:6}}>{a.icon}</div>
                      <div style={{fontWeight:700,color:got?"var(--accent)":"var(--text3)",fontSize:11.5,marginBottom:3}}>{a.title}</div>
                      <div style={{fontSize:10.5,color:"var(--text3)",lineHeight:1.4}}>{a.desc}</div>
                      {got&&<div style={{marginTop:6,fontSize:10,color:"var(--green)",fontWeight:700}}>✓ Получено</div>}
                    </div>
                  );
                })}
              </div>
            </Cd>
          )}
        </div>
      );
    }

    // ── CATALOG PAGE ──────────────────────────────────────────────
    function CatalogPage({quizzes,user,loading,onStart,onEdit,historyVersion,onEnterCode}){
      const[search,setSearch]=useState("");
      const[catF,setCatF]=useState("Все");
      const[diffF,setDiffF]=useState("Все");
      const{t}=useLang();
      const filtered=quizzes.filter(q=>{
        if(catF!=="Все"&&q.category!==catF) return false;
        if(diffF!=="Все"&&q.difficulty!==diffF) return false;
        if(search&&!q.title.toLowerCase().includes(search.toLowerCase())&&!q.category.toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });
      return(
        <div style={{padding:22,maxWidth:1080,margin:"0 auto"}}>
          <div style={{marginBottom:20,display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
            <div><h1 style={{fontFamily:"'Playfair Display',serif",fontSize:23,fontWeight:900,color:"var(--text)"}}>📚 {t("catalog")}</h1><p style={{color:"var(--text3)",fontSize:13,marginTop:3}}>IT тесты · {quizzes.length} тестов</p></div>
            <button onClick={onEnterCode} style={{display:"flex",alignItems:"center",gap:8,background:"var(--bg2)",color:"var(--text2)",border:"1.5px solid var(--border2)",borderRadius:10,padding:"10px 16px",fontWeight:700,fontSize:13.5,cursor:"pointer",transition:"all .17s",whiteSpace:"nowrap"}} onMouseEnter={e=>{e.currentTarget.style.background="var(--accent)";e.currentTarget.style.color="#fff";}} onMouseLeave={e=>{e.currentTarget.style.background="var(--bg2)";e.currentTarget.style.color="var(--text2)";}}>🔑 Войти по коду</button>
          </div>
          <div style={{marginBottom:13}}><Inp value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Поиск тестов..." icon=""/></div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,marginBottom:9}}>
            {CATS.map(c=><button key={c} onClick={()=>setCatF(c)} style={{whiteSpace:"nowrap",background:catF===c?"var(--accent)":"var(--bg2)",color:catF===c?"#fff":"var(--text2)",border:`1.5px solid ${catF===c?"var(--accent)":"var(--border)"}`,borderRadius:99,padding:"5px 13px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"all .17s"}}>{c==="Все"?t("all"):c}</button>)}
          </div>
          <div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap"}}>
            {["Все",...Object.keys(DIFF)].map(d=>{const di=DIFF[d];return <button key={d} onClick={()=>setDiffF(d)} style={{background:diffF===d?(di?.color||"var(--accent)"):"transparent",color:diffF===d?"#fff":(di?.color||"var(--text3)"),border:`1.5px solid ${di?.color||"var(--border)"}`,borderRadius:99,padding:"4px 12px",fontSize:11.5,fontWeight:700,cursor:"pointer",transition:"all .17s"}}>{di?`${di.dot} ${di.label}`:(t("all"))}</button>;})}
          </div>
          {loading?<div style={{padding:60,textAlign:"center"}}><Spin/></div>
            :filtered.length===0?<div style={{textAlign:"center",padding:60,color:"var(--text3)",fontSize:15}}>{t("noTests")}</div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:13}}>
              {filtered.map(q=><QuizCard key={q.id} quiz={q} isOwner={q.creatorId===user?.id} onStart={onStart} onEdit={onEdit} historyVersion={historyVersion}/>)}
            </div>}
        </div>
      );
    }

    // ── MAIN APP ──────────────────────────────────────────────────
    function App(){
      const[user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem(UK));}catch{return null;}});
      const[page,setPage]=useState("catalog");
      const[quizzes,setQuizzes]=useState([]);
      const[myQ,setMyQ]=useState([]);
      const[activeQ,setActiveQ]=useState(null);
      const[editQ,setEditQ]=useState(null);
      const[result,setResult]=useState(null);
      const[loading,setLoading]=useState(false);
      const[theme,setTheme]=useState(()=>localStorage.getItem("jp_theme")||"light");
      const[historyVersion,setHistoryVersion]=useState(0);
      const[proctoringStep,setProctoringStep]=useState("idle");
      const[proctoringReport,setProctoringReport]=useState(null);
      const buildProcReportRef=useRef(null);

      useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);localStorage.setItem("jp_theme",theme);},[theme]);
      function toggleTheme(){setTheme(t=>t==="dark"?"light":"dark");}

      // Build merged catalog from SEEDS + API + published localStorage tests
      async function load(){
        if(!user) return;
        setLoading(true);
        try{
          // Start with seeds as base catalog
          let catalog=[...SEEDS];

          // Try API
          try{
            const pub=await api("GET","/api/quizzes/public");
            if(pub&&pub.length>0){
              pub.forEach(aq=>{if(!catalog.find(q=>q.id===aq.id)) catalog.push(aq);});
            }
          }catch{}

          // Add published tests from localStorage
          try{
            const localPub=JSON.parse(localStorage.getItem(PUB_TESTS_KEY)||"[]").filter(t=>t.publishedToCatalog);
            localPub.forEach(lt=>{if(!catalog.find(q=>q.id===lt.id)) catalog.push(lt);});
          }catch{}

          setQuizzes(catalog);

          // Load MY tests from localStorage (primary) + API (secondary)
          const myLocal=getMyLocalTests(user.id);
          let myFromApi=[];
          try{myFromApi=await api("GET","/api/quizzes/my");}catch{}

          // Merge: localStorage is source of truth for user's own tests
          const myMerged=[...myLocal];
          myFromApi.forEach(aq=>{if(!myMerged.find(q=>q.id===aq.id)) myMerged.push(aq);});
          setMyQ(myMerged);

        }catch(e){}
        setLoading(false);
      }

      useEffect(()=>{if(user) load();},[user]);

      function doAuth(u){setUser(u);localStorage.setItem(UK,JSON.stringify(u));}
      function logout(){localStorage.removeItem(TK);localStorage.removeItem(UK);setUser(null);setQuizzes([]);setMyQ([]);}

      function handleSaveQuiz(savedQuiz){
        // Update myQ immediately
        setMyQ(prev=>{
          const idx=prev.findIndex(q=>q.id===savedQuiz.id);
          if(idx>=0){const next=[...prev];next[idx]=savedQuiz;return next;}
          return [...prev,savedQuiz];
        });
        // If published, add to catalog too
        if(savedQuiz.publishedToCatalog){
          setQuizzes(prev=>{
            const idx=prev.findIndex(q=>q.id===savedQuiz.id);
            if(idx>=0){const next=[...prev];next[idx]=savedQuiz;return next;}
            return [...prev,savedQuiz];
          });
        }
        setPage("profile");
        setEditQ(null);
      }

      async function delQ(id){
        if(!confirm("Удалить тест?")) return;
        try{await api("DELETE",`/api/quizzes/${id}`);}catch{}
        deleteMyLocalTest(id);
        setMyQ(prev=>prev.filter(q=>q.id!==id));
        setQuizzes(prev=>prev.filter(q=>q.id!==id));
      }

      function handleStartQuiz(quiz){
        setActiveQ(quiz);
        setProctoringReport(null);
        buildProcReportRef.current=null;
        if(quiz.proctoring?.enabled){
          setProctoringStep("consent");
          setPage("proctoring_consent");
        } else {
          setProctoringStep("idle");
          setPage("session");
        }
      }

      function handleFinish(r){
        const procReport=buildProcReportRef.current?buildProcReportRef.current():null;
        if(procReport){
          saveProctoringReport(activeQ.id,user?.name||"Студент",procReport);
          setProctoringReport(procReport);
        }
        saveAttempt(activeQ.id,activeQ.title,activeQ.emoji,{...r,passingScore:activeQ.passingScore});
        // Save private result if it's a private test
        if(activeQ.isPrivate){
          savePrivateResult({testId:activeQ.id,userName:user?.name||"Аноним",date:new Date().toISOString(),score:r.score,passed:r.passed,correct:r.correct,total:r.total,timeSpent:r.timeSpent});
        }
        setHistoryVersion(v=>v+1);  // triggers re-render for stats
        setResult(r);
        setProctoringStep("idle");
        setPage("result");
      }

      if(!user) return <AuthPage onAuth={doAuth}/>;

      // All quizzes for catalog: seeds + published user tests
      const allQ=[...quizzes];
      // Also include unpublished user quizzes in catalog view (only for owner)
      myQ.forEach(mq=>{if(!allQ.find(q=>q.id===mq.id)) allQ.push(mq);});

      const BG={minHeight:"100vh",background:"var(--bg)"};
      const SB=<Sidebar page={page} setPage={p=>{setPage(p);if(p!=="edit")setEditQ(null);}} user={user} logout={logout} theme={theme} toggleTheme={toggleTheme}/>;

      if(page==="proctoring_consent"&&activeQ){
        return(
          <div style={BG}>
            {SB}
            <div style={{marginLeft:"var(--sw)",minHeight:"100vh"}}>
              <ProctoringConsent
                quiz={activeQ}
                onAccept={()=>{setProctoringStep("active");setPage("session");}}
                onDecline={()=>{setActiveQ(null);setProctoringStep("idle");setPage("catalog");}}
              />
            </div>
          </div>
        );
      }

      if(page==="session"&&activeQ){
        const sessionContent=(
          <QuizSession
            quiz={activeQ}
            onFinish={handleFinish}
            onExit={()=>{setProctoringStep("idle");setPage("catalog");setActiveQ(null);}}
          />
        );
        return(
          <div style={BG}>
            {SB}
            <div style={{marginLeft:"var(--sw)",minHeight:"100vh"}}>
              {proctoringStep==="active"
                ?<ProctoringMonitor quiz={activeQ} onReport={fn=>{buildProcReportRef.current=fn;}}>
                    {sessionContent}
                  </ProctoringMonitor>
                :sessionContent
              }
            </div>
          </div>
        );
      }

      if(page==="result"&&result&&activeQ){
        return(
          <div style={BG}>
            {SB}
            <div style={{marginLeft:"var(--sw)",padding:"26px 18px",minHeight:"100vh"}}>
              <QuizResult
                result={result}
                quiz={activeQ}
                proctoringReport={proctoringReport}
                onRestart={()=>{handleStartQuiz(activeQ);}}
                onExit={()=>{setPage("catalog");setActiveQ(null);setResult(null);setProctoringReport(null);}}
              />
            </div>
          </div>
        );
      }

      if(page==="create"||page==="edit"){
        return(
          <div style={BG}>{SB}
            <div style={{marginLeft:"var(--sw)",padding:"22px 16px",minHeight:"100vh"}}>
              <QuizEditor quiz={editQ} onSave={handleSaveQuiz} onCancel={()=>{setPage("catalog");setEditQ(null);}} userId={user?.id}/>
            </div>
          </div>
        );
      }

      if(page==="enter_code"){
        return(
          <div style={BG}>
            {SB}
            <div style={{marginLeft:"var(--sw)",minHeight:"100vh"}}>
              <EnterCodePage
                onFound={quiz=>{handleStartQuiz(quiz);}}
                onBack={()=>setPage("catalog")}
              />
            </div>
          </div>
        );
      }

      return(
        <div style={BG}>
          {SB}
          <div style={{marginLeft:"var(--sw)",minHeight:"100vh",transition:"margin-left .25s"}}>
            {page==="catalog"&&<CatalogPage quizzes={allQ} user={user} loading={loading} historyVersion={historyVersion} onStart={handleStartQuiz} onEdit={q=>{setEditQ(q);setPage("edit");}} onEnterCode={()=>setPage("enter_code")}/>}
            {page==="profile"&&<ProfilePage user={user} myQuizzes={myQ} onEditQuiz={q=>{setEditQ(q);setPage("edit");}} onDeleteQuiz={delQ}/>}
            {page==="leaderboard"&&<LeaderboardPage user={user}/>}
            {page==="history"&&<HistoryPage quizzes={allQ}/>}
            {page==="analytics"&&<AnalyticsPage user={user} quizzes={allQ}/>}
            {page==="security"&&<SecurityPage user={user}/>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <LangProvider>
        <LangSwitcher/>
        <App/>
      </LangProvider>
    );
</script>
</body>
</html>
