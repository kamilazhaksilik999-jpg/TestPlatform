// ═══════════════ API HELPERS ═══════════════
async function apiCall(method, path, body=null){
  const token = localStorage.getItem(TOKEN_KEY);
  const opts = {
    method,
    headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{})},
  };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(API+path, opts);
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||'Ошибка сервера');
  return data;
}

  const[error,setError]=useState("");
  const[loading,setLoading]=useState(false);

  async function submit(){
    setError(""); setLoading(true);
    try{
      let data;
      if(tab==="login"){
        data=await apiCall("POST","/api/auth/login",{email,password});
      } else {
        data=await apiCall("POST","/api/auth/register",{name,email,password});
      }
      localStorage.setItem(TOKEN_KEY,data.token);
      localStorage.setItem(USER_KEY,JSON.stringify(data.user));
      onAuth(data.user);
    }catch(e){setError(e.message);}
    setLoading(false);
  }

// ═══════════════ QUIZ SESSION ═══════════════
function QuizSession({quiz,onFinish,onExit}){
  const qs=Array.isArray(quiz.questions)?quiz.questions:[];
  const[idx,setIdx]=useState(0);
  const[answers,setAnswers]=useState({});
  const[timeLeft,setTimeLeft]=useState((quiz.timerMinutes||20)*60);
  const[finished,setFinished]=useState(false);

  useEffect(()=>{
    if(finished) return;
    const t=setInterval(()=>setTimeLeft(s=>{if(s<=1){clearInterval(t);handleFinish();return 0;}return s-1;}),1000);
    return()=>clearInterval(t);
  },[finished]);

  function handleAnswer(qId,idx){
    setAnswers(a=>({...a,[qId]:idx}));
  }
  function handleMulti(qId,idx){
    setAnswers(a=>{const cur=a[qId]||[];return{...a,[qId]:cur.includes(idx)?cur.filter(i=>i!==idx):[...cur,idx]};});
  }
  function handleText(qId,val){setAnswers(a=>({...a,[qId]:val}));}

  function handleFinish(){
    setFinished(true);
    let correct=0,total=0;
    qs.forEach(q=>{
      const pts=q.points||1;
      total+=pts;
      const a=answers[q.id];
      if(q.type==="SINGLE_CHOICE"&&a===q.correctAnswerIndices?.[0]) correct+=pts;
      else if(q.type==="TRUE_FALSE"&&a===q.correctAnswerIndices?.[0]) correct+=pts;
      else if(q.type==="MULTIPLE_CHOICE"){
        const sel=Array.isArray(a)?[...a].sort():[];
        const exp=[...(q.correctAnswerIndices||[])].sort();
        if(JSON.stringify(sel)===JSON.stringify(exp)) correct+=pts;
      } else if(q.type==="OPEN_TEXT"&&typeof a==="string"&&a.trim().toLowerCase()===q.correctTextAnswer?.toLowerCase()) correct+=pts;
    });
    const score=total>0?Math.round(correct/total*100):0;
    onFinish({score,correct,total,timeSpent:(quiz.timerMinutes||20)*60-timeLeft});
  }

  if(finished) return <div style={{textAlign:"center",padding:60}}><Spinner/></div>;

  const q=qs[idx];
  const mm=Math.floor(timeLeft/60),ss=String(timeLeft%60).padStart(2,"0");
  const progress=(idx+1)/qs.length*100;

  return(
    <div style={{maxWidth:680,margin:"0 auto",padding:20}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <div style={{color:"#6366f1",fontWeight:700,fontSize:13}}>Вопрос {idx+1} из {qs.length}</div>
          <div style={{color:"#94a3b8",fontSize:13}}>{quiz.title}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{background:timeLeft<60?"rgba(239,68,68,.2)":"rgba(99,102,241,.2)",border:`1px solid ${timeLeft<60?"rgba(239,68,68,.4)":"rgba(99,102,241,.3)"}`,borderRadius:99,padding:"6px 14px",color:timeLeft<60?"#fca5a5":"#a5b4fc",fontWeight:700,fontSize:14}}>⏱ {mm}:{ss}</div>
          <Btn onClick={onExit} outline size="sm" color="#64748b">✕</Btn>
        </div>
      </div>
      {/* Progress */}
      <div style={{background:"rgba(255,255,255,.06)",borderRadius:99,height:6,marginBottom:24}}>
        <div style={{width:`${progress}%`,height:"100%",background:"linear-gradient(90deg,#6366f1,#8b5cf6)",borderRadius:99,transition:"width .4s ease"}}/>
      </div>

      <GlassCard style={{padding:28}}>
        <div style={{fontWeight:700,fontSize:18,color:"#f1f5f9",marginBottom:24,lineHeight:1.5}}>{q?.text}</div>

        {(q?.type==="SINGLE_CHOICE"||q?.type==="TRUE_FALSE")&&(q?.options||[]).map((opt,i)=>(
          <div key={i} onClick={()=>handleAnswer(q.id,i)}
            style={{border:`2px solid ${answers[q.id]===i?"#6366f1":"rgba(255,255,255,.08)"}`,background:answers[q.id]===i?"rgba(99,102,241,.15)":"rgba(255,255,255,.03)",borderRadius:12,padding:"14px 18px",marginBottom:10,cursor:"pointer",transition:"all .15s",color:answers[q.id]===i?"#a5b4fc":"#cbd5e1",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${answers[q.id]===i?"#6366f1":"rgba(255,255,255,.2)"}`,background:answers[q.id]===i?"#6366f1":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {answers[q.id]===i&&<div style={{width:8,height:8,borderRadius:"50%",background:"#fff"}}/>}
            </div>
            {opt}
          </div>
        ))}

        {q?.type==="MULTIPLE_CHOICE"&&(q?.options||[]).map((opt,i)=>{
          const sel=(answers[q.id]||[]).includes(i);
          return <div key={i} onClick={()=>handleMulti(q.id,i)}
            style={{border:`2px solid ${sel?"#6366f1":"rgba(255,255,255,.08)"}`,background:sel?"rgba(99,102,241,.15)":"rgba(255,255,255,.03)",borderRadius:12,padding:"14px 18px",marginBottom:10,cursor:"pointer",transition:"all .15s",color:sel?"#a5b4fc":"#cbd5e1",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${sel?"#6366f1":"rgba(255,255,255,.2)"}`,background:sel?"#6366f1":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:13}}>
              {sel&&"✓"}
            </div>
            {opt}
          </div>;
        })}

        {q?.type==="OPEN_TEXT"&&<textarea value={answers[q.id]||""} onChange={e=>handleText(q.id,e.target.value)}
          placeholder="Введите ваш ответ..." rows={3}
          style={{width:"100%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:10,padding:"12px 16px",fontSize:14,color:"#e2e8f0",resize:"vertical",fontFamily:"inherit"}}/>}
      </GlassCard>

      <div style={{display:"flex",justifyContent:"space-between",marginTop:20}}>
        <Btn onClick={()=>setIdx(i=>Math.max(0,i-1))} outline disabled={idx===0} size="sm">← Назад</Btn>
        {idx<qs.length-1
          ? <Btn onClick={()=>setIdx(i=>i+1)} size="sm">Далее →</Btn>
          : <Btn onClick={handleFinish} color="#10b981" size="sm">✓ Завершить</Btn>}
      </div>
    </div>
  );
}

// ═══════════════ QUIZ RESULT ═══════════════
function QuizResult({quiz,result,onRestart,onExit}){
  const grade=result.score>=90?"EXCELLENT":result.score>=75?"GOOD":result.score>=60?"PASS":"FAIL";
  const conf={EXCELLENT:{emoji:"🏆",label:"Отлично!",color:"#10b981"},GOOD:{emoji:"⭐",label:"Хорошо!",color:"#3b82f6"},PASS:{emoji:"✅",label:"Зачёт",color:"#f59e0b"},FAIL:{emoji:"📉",label:"Не сдал",color:"#ef4444"}};
  const c=conf[grade];
  const mm=Math.floor(result.timeSpent/60),ss=String(result.timeSpent%60).padStart(2,"0");
  return(
    <div style={{maxWidth:500,margin:"0 auto",padding:20,textAlign:"center"}}>
      <GlassCard style={{padding:40}}>
        <div style={{fontSize:64,marginBottom:8}}>{c.emoji}</div>
        <div style={{fontSize:24,fontWeight:900,color:c.color,marginBottom:4}}>{c.label}</div>
        <div style={{fontSize:64,fontWeight:900,color:c.color,margin:"20px 0"}}>{result.score}%</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:28}}>
          {[["✅ Верно",`${result.correct}`,"#10b981"],["📝 Итого",`${result.total}`,"#6366f1"],["⏱ Время",`${mm}:${ss}`,"#f59e0b"]].map(([l,v,col])=>(
            <div key={l} style={{background:"rgba(255,255,255,.05)",borderRadius:12,padding:"14px 8px"}}>
              <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>{l}</div>
              <div style={{fontSize:20,fontWeight:800,color:col}}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={onRestart} outline style={{flex:1}}>🔄 Ещё раз</Btn>
          <Btn onClick={onExit} style={{flex:1}}>← Назад</Btn>
        </div>
      </GlassCard>
    </div>
  );
}

// ═══════════════ CREATE / EDIT QUIZ ═══════════════
function QuizEditor({quiz:editQuiz,user,onSave,onCancel}){
  const[title,setTitle]=useState(editQuiz?.title||"");
  const[category,setCategory]=useState(editQuiz?.category||"Python");
  const[difficulty,setDifficulty]=useState(editQuiz?.difficulty||"MEDIUM");
  const[timer,setTimer]=useState(editQuiz?.timerMinutes||20);
  const[passing,setPassing]=useState(editQuiz?.passingScore||60);
  const[coverColor,setCoverColor]=useState(editQuiz?.coverColor||"#6366f1");
  const[emoji,setEmoji]=useState(editQuiz?.emoji||"💻");
  const[questions,setQuestions]=useState(editQuiz?.questions||[]);
  const[status,setStatus]=useState(editQuiz?.status||"ACTIVE");
  const[saving,setSaving]=useState(false);
  const[error,setError]=useState("");

  const EMOJIS=["💻","🐍","🟨","⚛️","🗄️","🌿","🐳","🌐","⚡","🔐","🎯","📊","🧠","🔧","☁️"];
  const COLORS=["#6366f1","#8b5cf6","#3b82f6","#0ea5e9","#10b981","#f59e0b","#ef4444","#f97316","#3572A5","#f7df1e","#2496ed","#f05032"];
  const CATS=["Python","JavaScript","Java","C++","Алгоритмы","Базы данных","DevOps","Frontend","Сети","Кибербезопасность"];

  function addQ(){
    setQuestions(qs=>[...qs,{id:Date.now().toString(),text:"",type:"SINGLE_CHOICE",points:1,options:["","","",""],correctAnswerIndices:[0]}]);
  }
  function removeQ(id){setQuestions(qs=>qs.filter(q=>q.id!==id));}
  function updateQ(id,field,val){setQuestions(qs=>qs.map(q=>q.id===id?{...q,[field]:val}:q));}

  async function save(){
    if(!title.trim()){setError("Введите название");return;}
    if(questions.length===0){setError("Добавьте хотя бы один вопрос");return;}
    setError(""); setSaving(true);
    try{
      const body={title,category,difficulty,timerMinutes:Number(timer),passingScore:Number(passing),coverColor,emoji,status,questions,tags:[category.toLowerCase()]};
      let data;
      if(editQuiz?.id){
        data=await apiCall("PUT",`/api/quizzes/${editQuiz.id}`,body);
      } else {
        data=await apiCall("POST","/api/quizzes",body);
      }
      onSave(data);
    }catch(e){setError(e.message);}
    setSaving(false);
  }

  return(
    <div style={{maxWidth:720,margin:"0 auto",padding:20}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
        <Btn onClick={onCancel} outline size="sm" color="#64748b">← Назад</Btn>
        <h2 style={{flex:1,fontSize:20,fontWeight:800}}>{editQuiz?"Редактировать тест":"Создать тест"}</h2>
        <Btn onClick={save} disabled={saving} color="#10b981">{saving?"Сохранение...":"💾 Сохранить"}</Btn>
      </div>

      {error&&<div style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.3)",borderRadius:10,padding:"10px 14px",color:"#fca5a5",fontSize:13,marginBottom:16}}>{error}</div>}

      <GlassCard style={{padding:24,marginBottom:16}}>
        <div style={{fontWeight:700,marginBottom:16,color:"#94a3b8",fontSize:13,textTransform:"uppercase",letterSpacing:1}}>Основное</div>
        <div style={{display:"grid",gap:14}}>
          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Название теста"
            style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:10,padding:"12px 16px",fontSize:15,color:"#f1f5f9",width:"100%"}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <select value={category} onChange={e=>setCategory(e.target.value)} style={{background:"#1e2235",border:"1px solid rgba(255,255,255,.12)",borderRadius:10,padding:"12px",color:"#e2e8f0",fontSize:14}}>
              {CATS.map(c=><option key={c}>{c}</option>)}
            </select>
            <select value={difficulty} onChange={e=>setDifficulty(e.target.value)} style={{background:"#1e2235",border:"1px solid rgba(255,255,255,.12)",borderRadius:10,padding:"12px",color:"#e2e8f0",fontSize:14}}>
              {Object.entries(DIFF).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
            <div><div style={{fontSize:12,color:"#64748b",marginBottom:6}}>Время (мин)</div>
              <input type="number" value={timer} onChange={e=>setTimer(e.target.value)} min={5} max={120} style={{width:"100%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:10,padding:"10px",color:"#e2e8f0",fontSize:14}}/></div>
            <div><div style={{fontSize:12,color:"#64748b",marginBottom:6}}>Проходной балл %</div>
              <input type="number" value={passing} onChange={e=>setPassing(e.target.value)} min={0} max={100} style={{width:"100%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:10,padding:"10px",color:"#e2e8f0",fontSize:14}}/></div>
            <div><div style={{fontSize:12,color:"#64748b",marginBottom:6}}>Статус</div>
              <select value={status} onChange={e=>setStatus(e.target.value)} style={{width:"100%",background:"#1e2235",border:"1px solid rgba(255,255,255,.12)",borderRadius:10,padding:"10px",color:"#e2e8f0",fontSize:14}}>
                <option value="ACTIVE">Активен</option><option value="DRAFT">Черновик</option><option value="PRIVATE">Приватный</option>
              </select></div>
          </div>
        </div>

        {/* Emoji & Color */}
        <div style={{marginTop:16}}>
          <div style={{fontSize:12,color:"#64748b",marginBottom:8}}>Иконка</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
            {EMOJIS.map(e=><button key={e} onClick={()=>setEmoji(e)} style={{background:emoji===e?"rgba(99,102,241,.3)":"rgba(255,255,255,.05)",border:`2px solid ${emoji===e?"#6366f1":"transparent"}`,borderRadius:10,padding:"8px 10px",fontSize:18,cursor:"pointer"}}>{e}</button>)}
          </div>
          <div style={{fontSize:12,color:"#64748b",marginBottom:8}}>Цвет обложки</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {COLORS.map(c=><button key={c} onClick={()=>setCoverColor(c)} style={{width:32,height:32,borderRadius:8,background:c,border:`3px solid ${coverColor===c?"#fff":"transparent"}`,cursor:"pointer"}}/>)}
          </div>
        </div>
      </GlassCard>

      {/* Questions */}
      <GlassCard style={{padding:24,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontWeight:700,color:"#94a3b8",fontSize:13,textTransform:"uppercase",letterSpacing:1}}>Вопросы ({questions.length})</div>
          <Btn onClick={addQ} size="sm" color="#10b981">+ Добавить</Btn>
        </div>
        {questions.map((q,qi)=>(
          <div key={q.id} style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:14,padding:18,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <span style={{color:"#6366f1",fontWeight:700,fontSize:13}}>Вопрос {qi+1}</span>
              <button onClick={()=>removeQ(q.id)} style={{background:"rgba(239,68,68,.15)",border:"none",borderRadius:8,padding:"4px 10px",color:"#fca5a5",cursor:"pointer",fontSize:13}}>✕</button>
            </div>
            <textarea value={q.text} onChange={e=>updateQ(q.id,"text",e.target.value)} placeholder="Текст вопроса..." rows={2}
              style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"10px",fontSize:14,color:"#e2e8f0",resize:"vertical",marginBottom:10,fontFamily:"inherit"}}/>
            <div style={{display:"flex",gap:10,marginBottom:10}}>
              <select value={q.type} onChange={e=>updateQ(q.id,"type",e.target.value)} style={{background:"#1e2235",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"8px",color:"#e2e8f0",fontSize:13,flex:1}}>
                <option value="SINGLE_CHOICE">Один вариант</option>
                <option value="MULTIPLE_CHOICE">Несколько</option>
                <option value="TRUE_FALSE">Верно/Неверно</option>
                <option value="OPEN_TEXT">Открытый ответ</option>
              </select>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:13,color:"#64748b"}}>Баллы:</span>
                <input type="number" value={q.points} onChange={e=>updateQ(q.id,"points",Number(e.target.value))} min={1} max={10}
                  style={{width:60,background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"8px",color:"#e2e8f0",fontSize:13,textAlign:"center"}}/>
              </div>
            </div>
            {(q.type==="SINGLE_CHOICE"||q.type==="MULTIPLE_CHOICE")&&(q.options||[]).map((opt,oi)=>(
              <div key={oi} style={{display:"flex",gap:8,marginBottom:6,alignItems:"center"}}>
                <input type={q.type==="MULTIPLE_CHOICE"?"checkbox":"radio"}
                  checked={q.type==="MULTIPLE_CHOICE"?(q.correctAnswerIndices||[]).includes(oi):q.correctAnswerIndices?.[0]===oi}
                  onChange={()=>{
                    if(q.type==="MULTIPLE_CHOICE"){
                      const cur=q.correctAnswerIndices||[];
                      updateQ(q.id,"correctAnswerIndices",cur.includes(oi)?cur.filter(i=>i!==oi):[...cur,oi]);
                    } else { updateQ(q.id,"correctAnswerIndices",[oi]); }
                  }} style={{accentColor:"#6366f1"}}/>
                <input value={opt} onChange={e=>updateQ(q.id,"options",(q.options||[]).map((o,i)=>i===oi?e.target.value:o))}
                  placeholder={`Вариант ${oi+1}`}
                  style={{flex:1,background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,padding:"8px 12px",fontSize:13,color:"#e2e8f0"}}/>
              </div>
            ))}
            {q.type==="TRUE_FALSE"&&<div style={{display:"flex",gap:8}}>
              {["Верно","Неверно"].map((opt,oi)=>(
                <label key={oi} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",color:"#94a3b8",fontSize:14}}>
                  <input type="radio" name={`tf_${q.id}`} checked={q.correctAnswerIndices?.[0]===oi} onChange={()=>updateQ(q.id,"correctAnswerIndices",[oi])} style={{accentColor:"#6366f1"}}/>{opt}
                </label>
              ))}
            </div>}
            {q.type==="OPEN_TEXT"&&<input value={q.correctTextAnswer||""} onChange={e=>updateQ(q.id,"correctTextAnswer",e.target.value)} placeholder="Правильный ответ (точная строка)"
              style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"8px 12px",fontSize:13,color:"#e2e8f0"}}/>}
          </div>
        ))}
        {questions.length===0&&<div style={{textAlign:"center",padding:32,color:"#334155"}}>Нажмите «+ Добавить» чтобы создать первый вопрос</div>}
      </GlassCard>
    </div>
  );
}

          <span style={{fontSize:13,color:"#6366f1",fontWeight:700}}>{pts} / {next[0]}</span>

      {/* My Quizzes */}
      <GlassCard style={{padding:24}}>
        <div style={{fontWeight:700,fontSize:17,marginBottom:16,color:"#f1f5f9"}}>📁 Мои тесты ({myQuizzes.length})</div>
        {myQuizzes.length===0
          ? <div style={{textAlign:"center",padding:32,color:"#334155"}}>Вы ещё не создали ни одного теста</div>
          : myQuizzes.map(q=>(
            <div key={q.id} style={{display:"flex",alignItems:"center",gap:12,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12,padding:"14px 16px",marginBottom:10}}>
              <span style={{fontSize:24}}>{q.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:"#f1f5f9",fontSize:14}}>{q.title}</div>
                <div style={{color:"#64748b",fontSize:12,marginTop:2}}>{q.category} • {Array.isArray(q.questions)?q.questions.length:0} вопр. • {q.status==="ACTIVE"?"🟢 Активен":"🟡 Черновик"}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <Btn onClick={()=>onEditQuiz(q)} outline size="sm">✏️</Btn>
                <Btn onClick={()=>onDeleteQuiz(q.id)} size="sm" color="#ef4444" outline>🗑️</Btn>

// ═══════════════ MAIN APP ═══════════════
function App(){
  const[user,setUser]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(USER_KEY));}catch{return null;}
  });
  const[page,setPage]=useState("catalog"); // catalog | profile | create | edit | session | result
  const[quizzes,setQuizzes]=useState([]);
  const[myQuizzes,setMyQuizzes]=useState([]);
  const[activeQuiz,setActiveQuiz]=useState(null);
  const[editQuiz,setEditQuiz]=useState(null);
  const[result,setResult]=useState(null);
  const[catFilter,setCatFilter]=useState("Все");
  const[search,setSearch]=useState("");
  const[loading,setLoading]=useState(false);
  const[seeded,setSeeded]=useState(false);

  // Seed demo quizzes если пустая БД
  async function seedIfEmpty(token){
    try{
      const list=await apiCall("GET","/api/quizzes/public");
      if(list.length===0&&!seeded){
        setSeeded(true);
        for(const q of SEED_QUIZZES){
          await apiCall("POST","/api/quizzes",q).catch(()=>{});
        }
        return await apiCall("GET","/api/quizzes/public");
      }
      return list;
    }catch{return [];}
  }

  async function loadData(){
    if(!user) return;
    setLoading(true);
    try{
      const pub=await seedIfEmpty();
      setQuizzes(pub);
      const my=await apiCall("GET","/api/quizzes/my");
      setMyQuizzes(my);
    }catch{}
    setLoading(false);
  }

  useEffect(()=>{if(user) loadData();},[user]);

  function handleAuth(u){
    setUser(u);
    localStorage.setItem(USER_KEY,JSON.stringify(u));
  }

  function logout(){
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(USER_KEY);
    setUser(null);
    setQuizzes([]);
    setMyQuizzes([]);
  }

  async function handleSaveQuiz(data){
    await loadData();
    setPage("profile");
    setEditQuiz(null);
  }

  async function handleDeleteQuiz(id){
    if(!confirm("Удалить тест?")) return;
    await apiCall("DELETE",`/api/quizzes/${id}`);
    await loadData();
  }

  if(!user) return <AuthPage onAuth={handleAuth}/>;

  // Session
  if(page==="session"&&activeQuiz){
    return <div style={{minHeight:"100vh",padding:"80px 20px 20px",background:"#0f1117"}}>
      <QuizSession quiz={activeQuiz} onFinish={r=>{setResult(r);setPage("result");}} onExit={()=>{setPage("catalog");setActiveQuiz(null);}}/>
    </div>;
  }
  if(page==="result"&&result&&activeQuiz){
    return <div style={{minHeight:"100vh",padding:"80px 20px 20px",background:"#0f1117"}}>
      <QuizResult quiz={activeQuiz} result={result} onRestart={()=>setPage("session")} onExit={()=>{setPage("catalog");setActiveQuiz(null);setResult(null);}}/>
    </div>;
  }
  if(page==="create"||page==="edit"){
    return <div style={{minHeight:"100vh",paddingTop:72,background:"#0f1117"}}>
      <QuizEditor quiz={editQuiz} user={user} onSave={handleSaveQuiz} onCancel={()=>{setPage("catalog");setEditQuiz(null);}}/>
    </div>;
  }

  // Filtered quizzes
  const allQ=[...quizzes,...myQuizzes.filter(m=>!quizzes.find(q=>q.id===m.id))];
  const filtered=allQ.filter(q=>{
    if(catFilter!=="Все"&&q.category!==catFilter) return false;
    if(search&&!q.title.toLowerCase().includes(search.toLowerCase())&&!q.category.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return(
    <div style={{minHeight:"100vh",background:"#0f1117"}}>
      {/* NAV */}
      <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:100,background:"rgba(15,17,23,.9)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,.06)",height:60,display:"flex",alignItems:"center",padding:"0 24px",gap:16}}>
        <div style={{fontWeight:900,fontSize:18,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginRight:8}}>⚡ TestPlatform</div>
        {["catalog","profile"].map(p=>(
          <button key={p} onClick={()=>setPage(p)}
            style={{background:page===p?"rgba(99,102,241,.2)":"transparent",color:page===p?"#a5b4fc":"#94a3b8",border:`1px solid ${page===p?"rgba(99,102,241,.4)":"transparent"}`,borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all .2s"}}>
            {p==="catalog"?"📚 Каталог":"👤 Профиль"}
          </button>
        ))}
        <div style={{flex:1}}/>
        <Btn onClick={()=>{setEditQuiz(null);setPage("create");}} color="#10b981" size="sm">+ Создать тест</Btn>
        <button onClick={logout} style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)",color:"#fca5a5",borderRadius:8,padding:"6px 12px",fontSize:13,cursor:"pointer"}}>Выйти</button>
      </nav>

      <div style={{paddingTop:72}}>
        {/* CATALOG */}
        {page==="catalog"&&<div style={{maxWidth:1100,margin:"0 auto",padding:24}}>
          <div style={{marginBottom:24}}>
            <h1 style={{fontSize:26,fontWeight:900,color:"#f1f5f9",marginBottom:4}}>📚 Каталог IT-тестов</h1>
            <p style={{color:"#64748b",fontSize:14}}>Только программирование и информационные технологии</p>
          </div>

          {/* Search + Filter */}
          <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Поиск по названию..."
              style={{flex:1,minWidth:200,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,padding:"11px 16px",fontSize:14,color:"#e2e8f0"}}/>
          </div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:24}}>
            {CATEGORIES.map(c=>(
              <button key={c} onClick={()=>setCatFilter(c)}
                style={{whiteSpace:"nowrap",background:catFilter===c?"rgba(99,102,241,.3)":"rgba(255,255,255,.05)",color:catFilter===c?"#a5b4fc":"#94a3b8",border:`1px solid ${catFilter===c?"rgba(99,102,241,.5)":"rgba(255,255,255,.08)"}`,borderRadius:99,padding:"6px 16px",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all .2s"}}>
                {c}
              </button>
            ))}
          </div>

          {loading
            ? <div style={{display:"flex",justifyContent:"center",padding:60}}><Spinner/></div>
            : filtered.length===0
              ? <div style={{textAlign:"center",padding:60,color:"#334155"}}>Тестов не найдено</div>
              : <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
                  {filtered.map(q=><QuizCard key={q.id} quiz={q} isOwner={q.creatorId===user.id}
                    onStart={q=>{setActiveQuiz(q);setPage("session");}}
                    onEdit={q=>{setEditQuiz(q);setPage("edit");}}/>)}
                </div>}
        </div>}

        {/* PROFILE */}
        {page==="profile"&&<ProfilePage user={user} myQuizzes={myQuizzes}
          onEditQuiz={q=>{setEditQuiz(q);setPage("edit");}}
          onDeleteQuiz={handleDeleteQuiz}
          onRefresh={loadData}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
